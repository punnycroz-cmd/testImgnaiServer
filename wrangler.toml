name = "aether-share-worker"
main = "workers/share_worker.js"
compatibility_date = "2024-04-30"

# Cloudflare KV namespace for shortcodes
[[kv_namespaces]]
binding = "SHARE_KV"
id = "YOUR_KV_NAMESPACE_ID"

# Cloudflare R2 bucket for images
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "imagenai"

[vars]
# Add any environment variables here
