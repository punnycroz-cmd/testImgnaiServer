<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap');

    :root {
      --bg-base: #f1f7f4;
      --panel-bg: rgba(255, 255, 255, 0.5);
      --panel-border: rgba(255, 255, 255, 0.7);
      --panel-shadow: rgba(0, 50, 20, 0.1);
      --text-main: #10243a;
      --text-muted: #64748b;
      --accent: #10b981;
      --accent-hover: #059669;
      --accent-glow: rgba(16, 185, 129, 0.4);
      --accent-text: #fff;
    }

    body[data-mode="nsfw"] {
      --bg-base: #0f172a;
      --panel-bg: rgba(15, 23, 42, 0.62);
      --panel-border: rgba(255, 255, 255, 0.12);
      --panel-shadow: rgba(0, 0, 0, 0.5);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #8b5cf6;
      --accent-hover: #7c3aed;
      --accent-glow: rgba(139, 92, 246, 0.5);
      --accent-text: #fff;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background:
        radial-gradient(circle at top, rgba(16, 185, 129, 0.12), transparent 30%),
        linear-gradient(180deg, var(--bg-base), var(--bg-base));
      color: var(--text-main);
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      transition: background-color 0.6s ease, color 0.3s ease;
    }

    h1,
    h2,
    h3,
    .cinematic-text {
      font-family: 'Cinzel', serif;
    }

    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--panel-border);
      box-shadow: 0 20px 40px var(--panel-shadow);
      border-radius: 2rem;
    }

    .nav-pill {
      transition: all 0.25s ease;
      color: var(--text-muted);
      cursor: pointer;
    }

    .nav-pill.active {
      color: var(--accent-text);
      background: var(--accent);
      box-shadow: 0 10px 25px var(--accent-glow);
    }

    textarea,
    select,
    input {
      background: var(--panel-bg) !important;
      border: 1px solid var(--panel-border) !important;
      color: var(--text-main) !important;
      border-radius: 1rem !important;
      transition: all 0.2s ease !important;
    }

    textarea:focus,
    select:focus,
    input:focus {
      outline: none !important;
      box-shadow: 0 0 0 3px var(--accent-glow) !important;
      border-color: var(--accent) !important;
    }

    .btn-magic {
      background: var(--accent);
      color: var(--accent-text);
      transition: all 0.25s ease;
      border-radius: 1.25rem;
      cursor: pointer;
    }

    .btn-magic:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 14px 32px var(--accent-glow);
      transform: translateY(-2px);
    }

    .btn-magic:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .loader {
      width: 18px;
      height: 18px;
      border: 2px solid white;
      border-top-color: transparent;
      border-radius: 999px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes float {
      from {
        transform: translateY(0px);
      }

      to {
        transform: translateY(-14px);
      }
    }

    main {
      padding-top: 8rem;
      padding-bottom: 22rem;
      overflow-y: auto;
      height: 100vh;
      scrollbar-width: none;
    }

    @media (max-width: 768px) {
      html {
        font-size: 14px;
      }

      h2.cinematic-text {
        font-size: 1.75rem !important;
      }

      main {
        padding-top: 7.5rem;
        padding-bottom: 38rem;
      }

      .bottom-console {
        bottom: 5rem !important;
      }

      .view {
        padding-top: 1rem;
      }
    }

    .mobile-nav-item svg {
      width: 20px;
      height: 20px;
      margin-bottom: 4px;
    }

    .mobile-nav-item.active {
      color: var(--accent);
    }


    main::-webkit-scrollbar {
      width: 0;
    }

    .bubble-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      padding: 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .bubble {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      position: relative;
      cursor: pointer;
      animation: float 4s infinite alternate ease-in-out;
      overflow: hidden;
      isolation: isolate;
    }

    .bubble-img-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      z-index: 1;
    }

    .bubble-img-overlay img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .bubble-sphere {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: absolute;
      inset: 0;
      z-index: 2;
      background: radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.42) 0%, transparent 60%);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .bubble-canvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      border-radius: 50%;
      z-index: 50;
      width: 260px;
      height: 260px;
    }

    .vault-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: var(--accent);
      color: white;
      font-size: 8px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 999px;
      z-index: 10;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 10px var(--accent-glow);
    }

    .art-frame {
      border-radius: 1.25rem;
      overflow: hidden;
      position: relative;
      transition: all 0.3s ease;
      background: var(--panel-bg);
      cursor: pointer;
      border: 2px solid transparent;
    }

    .art-frame:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
    }

    /* Modern Lightbox Redesign */
    #bubbleReveal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      transition: opacity 0.4s ease, backdrop-filter 0.4s ease;
      display: none;
      opacity: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px);
      padding: 1rem;
      gap: 2rem;
    }

    @media (min-width: 1024px) {
      #bubbleReveal {
        flex-direction: row;
        padding: 4rem;
        gap: 4rem;
        align-items: center;
      }

      #bubbleReveal .image-viewer-container {
        flex: 7;
        display: flex;
        justify-content: center;
        align-items: center;
        max-height: 85vh;
      }

      .glass-reveal-panel {
        flex: 3;
        max-width: 450px;
        min-width: 350px;
        height: min-content;
        max-height: 85vh;
        overflow-y: auto;
      }

      #bubbleReveal img {
        max-height: 85vh;
      }
    }




    #bubbleReveal.active {
      display: flex !important;
      opacity: 1;
    }

    .glass-reveal-panel {
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 28px;
      transform: translateY(30px);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      color: white;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    #bubbleReveal.active .glass-reveal-panel {
      transform: translateY(0);
    }

    #bubbleReveal.active img {
      transform: scale(1);
    }

    #bubbleReveal img {
      transform: scale(0.95);
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }


    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .bottom-console {
      position: fixed;
      bottom: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 1.5rem);
      max-width: 1100px;
      z-index: 100;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.25s ease;
      will-change: transform, opacity;
    }

    .bottom-console.minimized {
      transform: translate(-50%, calc(100%));
      opacity: 0;
      pointer-events: none;
    }

    @media (min-width: 1024px) {
      .bottom-console.minimized {
        transform: translate(-50%, calc(100% - 1rem));
        opacity: 0.9;
        pointer-events: auto;
      }

      .bottom-console.minimized #consoleToggleBtn {
        top: -45px;
        opacity: 1;
      }
    }


    #mobileToggleStub {
      display: none;
      position: absolute;
      top: -38px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1001;
    }


    @media (max-width: 768px) {
      .bottom-console.minimized+.mobile-nav .console-toggle-btn-overlay {
        display: block;
      }
    }


    /* Progress Matrix */
    .progress-matrix {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      margin-top: 1rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .progress-matrix.active {
      opacity: 1;
    }

    .progress-step {
      height: 4px;
      background: var(--panel-border);
      border-radius: 999px;
      position: relative;
    }

    .progress-step.done {
      background: var(--accent);
    }

    .progress-step.active::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      border-radius: 999px;
      animation: pulse-width 1.5s infinite;
    }

    @keyframes pulse-width {
      0% {
        width: 0%;
        opacity: 0.5;
      }

      100% {
        width: 100%;
        opacity: 0;
      }
    }

    .progress-label {
      font-size: 8px;
      text-transform: uppercase;
      font-weight: 800;
      letter-spacing: 1px;
      margin-top: 4px;
      color: var(--text-muted);
    }

    .progress-step.done+.progress-label {
      color: var(--accent);
    }

    /* Removed old meta-inspector css since it is explicitly rewritten using tailwind */
  </style>
</head>

<body data-mode="standard">
  <canvas id="aetherCanvas" class="fixed inset-0 pointer-events-none z-[-1]"></canvas>

  <header class="fixed top-5 left-0 right-0 z-[110] px-4 sm:px-8">
    <div
      class="max-w-7xl mx-auto glass-panel p-4 border-t-4 border-t-[var(--accent)] flex items-center justify-between gap-4 shadow-2xl">
      <div class="flex items-center gap-4 min-w-0">
        <div
          class="w-10 h-10 rounded-xl bg-[var(--accent)] text-white flex items-center justify-center shadow-lg transform -rotate-3 shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5">
            <path
              d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
          </svg>
        </div>
        <div class="min-w-0">
          <h1 class="text-2xl sm:text-3xl font-black cinematic-text tracking-[0.3em] truncate text-[var(--accent)]">
            AETHER WORLD</h1>
        </div>
      </div>

      <nav class="hidden sm:flex items-center gap-2 bg-black/5 p-1 rounded-2xl shrink-0">
        <button data-view="generate"
          class="nav-pill active px-4 sm:px-5 py-2 rounded-xl font-bold uppercase text-[10px] tracking-widest">Forge</button>
        <!-- Queue Disabled -->
        <button data-view="history"
          class="nav-pill px-4 sm:px-5 py-2 rounded-xl font-bold uppercase text-[10px] tracking-widest">Vault</button>
      </nav>

      <div class="status-pill hidden sm:inline-flex" id="backendStatus">Checking backend...</div>
    </div>
  </header>

  <div id="bubbleReveal"
    class="fixed inset-0 z-[2000] hidden flex-col items-center justify-start p-4 sm:p-12 bg-black/80 backdrop-blur-md overflow-y-auto"
    onclick="closeBubbleReveal(event)">
    <!-- Floating Image Container -->
    <div class="image-viewer-container w-full relative flex items-center justify-center my-auto pt-8 pb-4"
      onclick="event.stopPropagation()">
      <img id="bubbleRevealImg" src="" alt="Manifestation"
        class="max-w-full max-h-[75vh] object-contain rounded-2xl shadow-[0_20px_80px_rgba(0,0,0,0.9)] border border-white/10 transition-all duration-500 hover:scale-[1.01]">
    </div>

    <!-- Floating Glass Info Panel -->
    <div class="glass-reveal-panel w-full p-8 sm:p-10 flex flex-col gap-6 shadow-2xl mb-24 sm:mb-0"
      onclick="event.stopPropagation()">
      <div id="thumbsSection" class="hidden flex-col gap-3">
        <span class="opacity-60 uppercase font-black text-[9px] tracking-[0.2em] mb-1 text-[var(--accent)]">The
          Batch</span>
        <div id="bubbleRevealThumbs" class="grid grid-cols-4 gap-2"></div>
      </div>

      <div id="metaInspector" class="grid grid-cols-2 gap-8 border-t border-white/10 pt-6">
        <div class="flex flex-col"><span
            class="opacity-60 uppercase font-black text-[10px] tracking-[0.2em] mb-2 text-[var(--accent)]">Casting
            Engine</span><span class="font-bold text-lg tracking-tight" id="metaModel">-</span></div>
        <div class="flex flex-col items-end"><span
            class="opacity-60 uppercase font-black text-[10px] tracking-[0.2em] mb-2 text-[var(--accent)]">Celestial
            Realm</span><span class="font-bold text-white text-lg uppercase tracking-wide" id="metaRealm">-</span></div>
        <div class="col-span-2 pt-6 border-t border-white/10">
          <span
            class="opacity-60 uppercase font-black text-[10px] tracking-[0.2em] mb-3 block text-[var(--accent)]">Inscription</span>
          <p id="metaPrompt" class="text-base sm:text-lg leading-relaxed text-white font-medium italic tracking-tight">-
          </p>
        </div>
      </div>

      <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 pt-6 border-t border-white/5">
        <a id="bubbleRevealDownload" href="#" download
          class="btn-magic h-12 flex items-center justify-center rounded-xl text-[10px] font-black uppercase tracking-[0.15em] shadow-2xl">Collect</a>
        <button onclick="cloneActiveManifestation()"
          class="h-12 rounded-xl border-2 border-[var(--accent)] text-[var(--accent)] hover:bg-[var(--accent)] hover:text-white transition-all text-[10px] font-black uppercase tracking-[0.15em]">Invoke</button>
        <button onclick="closeBubbleReveal()"
          class="h-12 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 text-[10px] font-black uppercase tracking-[0.15em] hidden lg:block">Close</button>

        <div class="col-span-2 lg:col-span-3 grid grid-cols-2 gap-3 mt-1">
          <button onclick="banishCurrentItem()"
            class="h-12 rounded-xl bg-red-500/10 border border-red-500/20 text-red-500 hover:bg-red-500 hover:text-white transition-all text-[10px] font-black uppercase tracking-[0.15em]">Banish
            One</button>
          <button onclick="banishBatch()"
            class="h-12 rounded-xl bg-red-900/20 border border-red-500/30 text-red-400 hover:bg-red-600 hover:text-white transition-all text-[10px] font-black uppercase tracking-[0.15em]">Banish
            Batch</button>
        </div>
        <button onclick="closeBubbleReveal()"
          class="h-12 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 text-[10px] font-black uppercase tracking-[0.15em] lg:hidden col-span-2">Close</button>
      </div>


    </div>
  </div>

  <main id="mainContent">
    <section id="view-generate" class="view">
      <div class="max-w-7xl mx-auto px-4 sm:px-8">


        <div id="gallery" class="bubble-container">
          <div id="galleryEmpty"
            class="col-span-full py-20 text-center opacity-15 text-3xl font-light cinematic-text tracking-[0.3em] uppercase">
            Void Awaiting Light</div>
        </div>

        <!-- The Matrix Grid -->
        <div id="matrixControls"
          class="hidden flex items-center justify-between gap-4 py-4 px-2 bg-white/5 rounded-2xl border border-white/10 mb-4 animate-in fade-in slide-in-from-top-4 duration-500">
          <div class="flex items-center gap-3">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse" id="matrixStatusPulse"></span>
            <span class="text-[10px] font-black uppercase tracking-widest" id="matrixStatusText">Matrix Active</span>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="toggleMatrixPause()" id="matrixPauseBtn"
              class="px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-[9px] font-black uppercase tracking-widest transition-all">Pause</button>
            <button onclick="cancelMatrix()"
              class="px-4 py-2 rounded-lg bg-red-500/10 hover:bg-red-500/20 text-red-500 text-[9px] font-black uppercase tracking-widest transition-all border border-red-500/20">Cancel</button>
          </div>
        </div>
        <div id="matrixGallery" class="hidden grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 py-8"></div>
      </div>
    </section>

    <section id="view-tasks" class="view hidden px-4 sm:px-8">
      <div class="max-w-7xl mx-auto glass-panel p-6 sm:p-10 min-h-[400px]">
        <div class="flex items-center justify-between gap-4 mb-8">
          <h2 class="text-xl font-bold uppercase tracking-widest text-[var(--text-muted)]">Active Queue</h2>
          <button onclick="cancelAllJobs()"
            class="px-4 py-2 rounded-xl bg-red-500/10 hover:bg-red-500/20 text-red-500 text-[10px] font-black uppercase tracking-widest transition-all border border-red-500/20">Halt
            All</button>
        </div>
        <div id="taskList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
      </div>
    </section>

    <section id="view-history" class="view hidden px-4 sm:px-8">
      <div class="max-w-7xl mx-auto min-h-[400px] relative">
        <div class="flex flex-col sm:flex-row items-center justify-between gap-6 mb-10">
          <div class="flex items-center gap-2 bg-black/10 p-1.5 rounded-2xl border border-white/5">
            <button onclick="setVaultRealm('day')" id="vbtn-day"
              class="px-6 py-2.5 rounded-xl font-bold text-[10px] uppercase tracking-widest transition-all">SFW /
              Day</button>
            <button onclick="setVaultRealm('star')" id="vbtn-star"
              class="px-6 py-2.5 rounded-xl font-bold text-[10px] uppercase tracking-widest transition-all opacity-40">NSFW
              / Star</button>
          </div>

          <div class="flex items-center gap-4">
            <button onclick="toggleSelectionMode()" id="toggleSelectBtn"
              class="text-[10px] font-bold uppercase tracking-widest opacity-60 hover:opacity-100">Select Mode</button>
            <div class="w-px h-4 bg-white/10"></div>
            <button onclick="reloadHistory()"
              class="text-[10px] font-bold uppercase tracking-widest text-[var(--accent)]">Reload</button>
            <button onclick="clearVault()" class="text-[10px] font-bold uppercase text-red-500 hover:opacity-70">Purge
              Cache</button>
          </div>
        </div>





        <div id="historyList" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 transition-all"
          data-select-mode="false"></div>
        <div class="mt-8 flex justify-center">
          <button id="loadMoreBtn" onclick="loadHistoryPage()"
            class="btn-magic px-5 py-3 text-[10px] font-bold uppercase tracking-widest">Load More</button>
        </div>
      </div>
    </section>

  </main>

  <div id="desktopConsole" class="bottom-console glass-panel p-4 border-2 border-[var(--accent)]">
    <button onclick="toggleConsole()" id="consoleToggleBtn"
      class="absolute -top-10 left-1/2 -translate-x-1/2 bg-[var(--accent)] text-white px-6 py-2 rounded-t-xl font-bold text-[10px] uppercase tracking-widest shadow-lg">
      <span id="consoleToggleText">Minimize</span>
    </button>

    <div class="grid grid-cols-12 gap-4 items-stretch">
      <div class="col-span-12 lg:col-span-4 flex flex-col gap-3">
        <div class="flex items-center gap-1 bg-black/5 p-1 rounded-xl h-9">
          <button data-mode="standard"
            class="nav-pill active w-1/2 h-full rounded-lg text-[9px] font-bold uppercase">Day</button>
          <button data-mode="nsfw" class="nav-pill w-1/2 h-full rounded-lg text-[9px] font-bold uppercase">Star</button>
        </div>
        <div class="space-y-1">
          <label class="text-[9px] font-bold uppercase opacity-50 ml-1">Engine</label>
          <select id="model" class="w-full h-9 px-3 font-bold text-xs"></select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="space-y-1">
            <label class="text-[9px] font-bold uppercase opacity-50 ml-1">Quality</label>
            <select id="quality" class="w-full h-9 px-3 font-bold text-xs"></select>
          </div>
          <div class="space-y-1">
            <label class="text-[9px] font-bold uppercase opacity-50 ml-1">Size</label>
            <select id="aspect" class="w-full h-9 px-3 font-bold text-xs"></select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="space-y-1">
            <label class="text-[9px] font-bold uppercase opacity-50 ml-1">Images</label>
            <select id="count" class="w-full h-9 px-3 font-bold text-xs">
              <option value="1">1 Spirit</option>
              <option value="4" selected>4 Spirits</option>
            </select>
          </div>
          <div class="space-y-1">
            <label class="text-[9px] font-bold uppercase opacity-50 ml-1">Seed</label>
            <input id="seed" type="number" placeholder="Divine Seed" class="w-full h-9 px-3 font-bold text-xs">
          </div>
        </div>
      </div>

                  <path
                    d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />

          <button id="matrixBtn" onclick="runMatrixCast()"

            <span id="btnMatrixText">Matrix</span>
            <div id="btnMatrixLoader" class="hidden ml-2">
              <div class="loader" style="width:12px;height:12px;border-width:2px;animation-duration:2s"></div>

          <button id="generateBtn"
            class="col-span-2 btn-magic flex items-center justify-center gap-2 font-bold uppercase text-[11px] sm:text-xs tracking-widest shadow-lg min-h-[44px]">

  <div id="footerStatus"
    class="fixed bottom-8 left-1/2 -translate-x-1/2 glass-panel py-3 px-8 text-xs font-bold transition-all translate-y-32 opacity-0 pointer-events-none z-[150]">

  <!-- Mobile Nav -->

  <!-- Custom Confirm Modal -->

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

  <!-- Multi-Select Action Bar: True Viewport Fixed -->
  <div id="selectionBar"
    class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-[10000] glass-panel p-5 px-10 border-2 border-[var(--accent)] flex flex-col sm:flex-row items-center gap-8 shadow-[0_50px_120px_rgba(0,0,0,1)] animate-in slide-in-from-bottom-12 duration-500 rounded-[2.5rem]">
    <div class="flex items-center gap-8">
      <div class="flex flex-col">
        <span id="selectCount" class="text-3xl font-black tracking-tighter text-[var(--accent)]">0</span>
        <span class="text-[10px] uppercase tracking-[0.2em] opacity-60 font-black">Spirits</span>
      </div>
      <div class="w-px h-12 bg-white/10"></div>
      <div class="flex items-center gap-4">
        <button onclick="executeBulkAction('hide')"
          class="bg-white/5 border border-white/10 text-white px-8 py-4 rounded-3xl font-black text-[10px] uppercase tracking-[0.2em] hover:bg-white/15 transition-all">Hide</button>
        <button onclick="executeBulkAction('delete')"
          class="bg-red-600 text-white px-8 py-4 rounded-3xl font-black text-[10px] uppercase tracking-[0.2em] shadow-2xl hover:bg-red-500 hover:scale-105 transition-all">Banish</button>
      </div>

    <div class="flex items-center gap-8 mt-4 sm:mt-0 sm:border-l sm:border-white/10 sm:pl-10 w-full sm:w-auto">
      <button onclick="toggleSelectionMode(false)"
        class="w-full sm:w-auto text-[10px] font-black uppercase tracking-[0.2em] opacity-40 hover:opacity-100 transition-all">Cancel</button>
    </div>
  </div>



  <script>
    window.__SERVER_URL__ = "__SERVER_URL__";
    window.__SERVER_URL_NSFW__ = "__SERVER_URL_NSFW__";

    const DAY_MODELS = [
      "Ani", "Aura", "Evo", "Flux1 D", "Fur", "FurXL Classic", "Gen", "Glitch", "Gothic",
      "Hyper CGI", "HyperX", "Muse", "Nai", "Neo", "Noob", "Pixel", "Pony", "Rend",
      "Retro", "Supra", "Synth", "Toon", "Volt", "Wassie"
    ];
    const STAR_MODELS = [
      "Gen", "Ani", "Synth", "Fur", "Noob", "Aura", "Pixel", "Hyper CGI",
      "Volt", "Muse", "Rend", "Pony", "Neo", "Nai", "Retro", "Supra",
      "Evo", "Toon", "HyperX", "FurXL Classic", "Illustrious", "Real Amateurs",
      "RealX", "Real Classic"
    ];
    const ASPECT_CHOICES = ["1:1", "16:9", "5:2", "4:5", "4:7"];
    const QUALITY_CHOICES = ["Fast", "High Quality"];

    const state = {
      serverUrl: "",
      activeMode: localStorage.getItem("a_mode") || "standard",
      activeRequestId: localStorage.getItem("a_active_request_id") || "",
      activeRequest: null,
      historyPage: 1,
      historyLimit: 20,
      historyHasMore: true,
      historyLoaded: false,
      loadingHistory: false,
      currentPoll: null,
      vaultRealm: 'day',
      selectionMode: false,
      selectedIds: new Set(),
      matrixPaused: false,
      matrixCancelled: false
    };

    const dom = {
      model: document.getElementById("model"),
      prompt: document.getElementById("prompt"),
      negativePrompt: document.getElementById("negativePrompt"),
      generateBtn: document.getElementById("generateBtn"),
      btnText: document.getElementById("btnText"),
      btnLoader: document.getElementById("btnLoader"),
      gallery: document.getElementById("gallery"),
      historyList: document.getElementById("historyList"),
      taskList: document.getElementById("taskList"),
      count: document.getElementById("count"),
      aspect: document.getElementById("aspect"),
      quality: document.getElementById("quality"),
      seed: document.getElementById("seed"),
      footerStatus: document.getElementById("footerStatus"),
      loadMoreBtn: document.getElementById("loadMoreBtn"),
      activeRequestBadge: document.getElementById("activeRequestBadge"),
      backendStatus: document.getElementById("backendStatus"),
      matrixBtn: document.getElementById("matrixBtn"),
      btnMatrixText: document.getElementById("btnMatrixText"),
      btnMatrixLoader: document.getElementById("btnMatrixLoader")
    };

    function isUnresolved(v) {
      return !v || v.startsWith("__") || v.includes("REPLACE");
    }

    function resolveServerUrl(mode) {
      const std = isUnresolved(window.__SERVER_URL__) ? window.location.origin : window.__SERVER_URL__;
      const nsfw = isUnresolved(window.__SERVER_URL_NSFW__) ? std : window.__SERVER_URL_NSFW__;
      return (mode === "nsfw" ? nsfw : std).replace(/\/$/, "");
    }

    function setFooterMsg(msg, kind = "info") {
      dom.footerStatus.textContent = msg;
      dom.footerStatus.style.borderColor = kind === "error" ? "rgba(239,68,68,0.35)" : "var(--panel-border)";
      dom.footerStatus.classList.remove("translate-y-32", "opacity-0");
      setTimeout(() => dom.footerStatus.classList.add("translate-y-32", "opacity-0"), 3200);
    }

    function setLoading(loading) {
      dom.generateBtn.disabled = loading;
      dom.btnText.textContent = loading ? "Weaving..." : "Manifest";
      dom.btnLoader.classList.toggle("hidden", !loading);
    }

    function saveActiveRequest(requestId) {
      state.activeRequestId = requestId || "";
      if (requestId) localStorage.setItem("a_active_request_id", requestId);
      else localStorage.removeItem("a_active_request_id");
      renderActiveRequest();
    }

    function renderActiveRequest() {
      const badge = document.getElementById("activeRequestBadge");
      const retry = document.getElementById("retryBtn");
      if (!state.activeRequestId) {
        if (badge) badge.textContent = "No active request";
        if (retry) retry.disabled = true;
      } else {
        if (badge) badge.textContent = `Active request: ${state.activeRequestId.slice(0, 8)}...`;
        if (retry) retry.disabled = false;
      }
    }


    function applyMode(mode) {
      state.activeMode = mode;
      document.body.dataset.mode = mode;
      state.serverUrl = resolveServerUrl(mode);
      const previousModel = dom.model.value || localStorage.getItem("a_model") || "";
      const previousQuality = dom.quality.value || localStorage.getItem("a_quality") || "";
      const previousAspect = dom.aspect.value || localStorage.getItem("a_aspect") || "";
      const models = mode === "nsfw" ? STAR_MODELS : DAY_MODELS;
      dom.model.innerHTML = models.map(name => `<option value="${name}">${name}</option>`).join("");
      dom.quality.innerHTML = QUALITY_CHOICES
        .map(q => `<option value="${q}">${q}</option>`).join("");
      dom.aspect.innerHTML = ASPECT_CHOICES
        .map(a => `<option value="${a}">${a}</option>`).join("");
      document.querySelectorAll("[data-mode]").forEach(btn => btn.classList.toggle("active", btn.dataset.mode === mode));
      localStorage.setItem("a_mode", mode);
      dom.model.value = models.includes(previousModel) ? previousModel : (models[0] || "Gen");
      dom.quality.value = QUALITY_CHOICES.includes(previousQuality) ? previousQuality : QUALITY_CHOICES[0];
      dom.aspect.value = ASPECT_CHOICES.includes(previousAspect) ? previousAspect : ASPECT_CHOICES[0];
      localStorage.setItem("a_model", dom.model.value);
      localStorage.setItem("a_quality", dom.quality.value);
      localStorage.setItem("a_aspect", dom.aspect.value);

      refreshCurrentJob();
    }

    function getPayload() {
      const realm = state.activeMode === "nsfw" ? "star" : "day";
      return {
        prompt: dom.prompt.value.trim(),
        model: dom.model.value,
        nsfw: state.activeMode === "nsfw",
        count: parseInt(dom.count.value, 10),
        aspect: dom.aspect.value,
        quality: dom.quality.value,
        negative_prompt: dom.negativePrompt.value.trim(),
        seed: dom.seed.value ? parseInt(dom.seed.value, 10) : null,
        client_id: `client-${Date.now()}`,
        realm
      };
    }

    async function apiFetch(path, opts = {}) {
      if (!state.serverUrl || state.serverUrl.startsWith("file://")) {
        console.warn("Invalid server URL or file:// protocol. Skipping fetch:", path);
        throw new Error("Local File Protocol detected. Please run via a web server.");
      }
      try {
        const fetchOpts = {
          headers: {
            "Content-Type": "application/json",
            "Cache-Control": "no-cache",
            "Pragma": "no-cache",
            ...opts.headers
          },
          cache: "no-store",
          ...opts
        };
        const resp = await fetch(`${state.serverUrl}${path}`, fetchOpts);
        const text = await resp.text();
        let data = null;
        try { data = text ? JSON.parse(text) : null; } catch { data = { raw: text }; }
        if (!resp.ok) {
          const err = new Error(data?.detail || data?.error || `HTTP ${resp.status}`);
          err.status = resp.status;
          err.data = data;
          throw err;
        }
        return data;
      } catch (e) {
        if (dom.backendStatus) dom.backendStatus.textContent = "Backend Offline";
        console.error("apiFetch error:", e);
        throw e;
      }
    }

    function currentJobCard(job) {
      const created = job?.created_at ? new Date(job.created_at).toLocaleTimeString() : "Pending";
      const promptEscaped = escapeHtml(job?.prompt || "Inspiration being woven...");
      const isDone = job?.status === "done";
      const isError = job?.status === "error";
      const isMatrix = job?.request_id && job.request_id.startsWith("matrix-");

      return `
        <div class="glass-panel p-5 relative overflow-hidden transition-all hover:border-[var(--accent)]" data-request-id="${job?.request_id}">
          ${isDone ? '<div class="absolute top-0 right-0 p-2"><svg class="text-[var(--accent)] w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg></div>' : ''}
          <div class="flex items-start justify-between gap-4">
            <div class="min-w-0 flex-1">
              <div class="flex items-center gap-2 mb-2">
                <span class="px-2 py-0.5 rounded-full text-[9px] font-black uppercase tracking-tighter bg-[var(--accent)] text-white shadow-sm">${job?.realm || "day"}</span>
                <span class="text-[10px] font-bold uppercase tracking-widest text-[var(--text-muted)]">${isDone ? "Manifested" : (isError ? "Fractured" : "Weaving...")}</span>
              </div>
              <div class="font-bold text-sm tracking-tight leading-snug line-clamp-2" title="${promptEscaped}">${promptEscaped}</div>
            </div>
          </div>
          
          <div class="mt-4 grid grid-cols-2 gap-y-2 gap-x-4 text-[11px]">
            <div class="flex flex-col">
              <span class="text-[9px] uppercase font-bold text-[var(--text-muted)] opacity-50">Model</span>
              <span class="font-bold truncate">${job?.model || "Casting..."}</span>
            </div>
            <div class="flex flex-col">
              <span class="text-[9px] uppercase font-bold text-[var(--text-muted)] opacity-50">Time</span>
              <span class="font-bold text-[var(--text-muted)]">${created}</span>
            </div>
          </div>

          <div class="mt-5 flex items-center gap-2">
            ${isDone ?
          `<button class="btn-magic flex-1 py-2.5 text-[10px] font-bold uppercase tracking-widest shadow-md" onclick="resumeRequest('${job?.request_id}')">View Result</button>` :
          (isError ?
            `<button class="flex-1 py-2.5 rounded-xl bg-red-500/10 text-red-500 text-[10px] font-bold uppercase tracking-widest border border-red-500/20" disabled>Failed</button>` :
            `<button class="flex-1 py-2.5 rounded-xl bg-black/5 text-[var(--text-muted)] text-[10px] font-bold uppercase tracking-widest border border-[var(--panel-border)] flex items-center justify-center gap-2 cursor-wait" disabled>
                   <div class="loader" style="width:10px;height:10px;border-width:1.5px;border-color:var(--text-muted);border-top-color:transparent"></div>
                   Wandering...
                 </button>`)
        }
            <button class="px-3 py-2.5 rounded-xl border border-[var(--panel-border)] hover:bg-black/5 transition-colors" onclick="copyRequestId('${job?.request_id}')" title="Copy ID">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
            ${!isDone && !isError ? `
            <button class="px-3 py-2.5 rounded-xl border border-red-500/20 text-red-500 hover:bg-red-500/10 transition-colors" onclick="cancelJob('${job?.request_id}')" title="Cancel">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>` : ''}
          </div>
        </div>
      `;
    }

    function setProgress(step) {
      const matrix = document.getElementById("progressMatrix");
      if (!matrix) return;

      if (step === -1) {
        matrix.classList.remove("active");
        document.querySelectorAll(".progress-step").forEach(s => s.classList.remove("done", "active"));
        return;
      }
      matrix.classList.add("active");
      document.querySelectorAll(".progress-step").forEach((s, idx) => {
        s.classList.toggle("done", idx < step);
        s.classList.toggle("active", idx === step);
      });
    }

    async function runMatrixCast() {
      const payload = getPayload();
      if (!payload.prompt) return setFooterMsg("Inspiration required.", "error");

      const models = state.activeMode === "nsfw" ? STAR_MODELS : DAY_MODELS;

      dom.gallery.style.display = "none";
      const mGallery = document.getElementById("matrixGallery");
      mGallery.classList.remove("hidden");
      mGallery.classList.add("grid");

      // Build placeholders
      mGallery.innerHTML = models.map(m => `
        <div id="matrix-cell-${m.replace(/\s+/g, '-')}" class="art-frame aspect-square flex flex-col items-center justify-center bg-black/40 border border-white/10 relative group overflow-hidden">
          <span class="text-[10px] font-bold uppercase text-[var(--text-muted)] tracking-widest absolute bottom-3 z-20 group-hover:opacity-0 transition-opacity bg-black/50 px-2 py-0.5 rounded-lg border border-white/5">${m}</span>
          <div class="loader opacity-40 hidden z-20" style="width:20px;height:20px;"></div>
          <img src="" class="absolute inset-0 w-full h-full object-cover hidden transition-all duration-1000 opacity-0 scale-110 z-10">
        </div>
      `).join("");

      dom.generateBtn.disabled = true;
      dom.matrixBtn.disabled = true;
      dom.btnMatrixText.textContent = "Casting...";
      dom.btnMatrixLoader.classList.remove("hidden");
      document.getElementById("matrixControls").classList.remove("hidden");
      document.getElementById("matrixGallery").classList.remove("hidden");

      state.matrixPaused = false;
      state.matrixCancelled = false;
      updateMatrixStatusUI();

      try {
        setView("generate");
        toggleConsole("expand");

        for (let i = 0; i < models.length; i++) {
          // Check for cancellation
          if (state.matrixCancelled) {
            setFooterMsg("Matrix Casting Aborted.", "error");
            break;
          }

          // Check for pause
          while (state.matrixPaused) {
            await sleep(1000);
            if (state.matrixCancelled) break;
          }
          if (state.matrixCancelled) break;

          const model = models[i];
          const mPayload = { ...payload, model };
          const cellId = `matrix-cell-${model.replace(/\s+/g, '-')}`;
          const cell = document.getElementById(cellId);

          if (cell) {
            cell.querySelector(".loader").classList.remove("hidden");
            cell.classList.add("active-summon");
          }

          setFooterMsg(`Summoning Matrix Spirit ${i + 1}/${models.length}: ${model}`, "info");

          try {
            const res = await apiFetch("/generate", {
              method: "POST",
              body: JSON.stringify(mPayload)
            });

            // Poll until THIS one is done before moving to the next
            await pollSingleMatrixJob(res.request_id, model, cell);
          } catch (e) {
            console.error(`Matrix Job failed for ${model}`, e);
            if (cell) {
              cell.querySelector(".loader").classList.add("hidden");
              cell.style.boxShadow = "inset 0 0 40px rgba(239, 68, 68, 0.2)";
            }
          } finally {
            if (cell) cell.classList.remove("active-summon");
          }
        }

        setFooterMsg("Celestial Matrix Complete.", "success");
      } catch (err) {
        setFooterMsg("Matrix Error: " + err.message, "error");
      } finally {
        dom.generateBtn.disabled = false;
        dom.matrixBtn.disabled = false;
        dom.btnMatrixText.textContent = "Matrix";
        dom.btnMatrixLoader.classList.add("hidden");
        if (!state.matrixCancelled && !state.matrixPaused) {
          document.getElementById("matrixControls").classList.add("hidden");
        }
      }
    }

    function toggleMatrixPause() {
      state.matrixPaused = !state.matrixPaused;
      updateMatrixStatusUI();
    }

    function cancelMatrix() {
      state.matrixCancelled = true;
      state.matrixPaused = false;
      updateMatrixStatusUI();
    }

    function updateMatrixStatusUI() {
      const btn = document.getElementById("matrixPauseBtn");
      const text = document.getElementById("matrixStatusText");
      const pulse = document.getElementById("matrixStatusPulse");

      if (state.matrixCancelled) {
        text.textContent = "Matrix Cancelled";
        pulse.className = "w-2 h-2 rounded-full bg-red-500";
        btn.disabled = true;
        return;
      }

    async function pollSingleMatrixJob(requestId, model, cell, maxAttempts = 20) {
      // Matrix should move on quickly: the backend owns the long poll.
      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        if (state.matrixCancelled) return false;
        while (state.matrixPaused) { await sleep(1000); if (state.matrixCancelled) return false; }
        try {
          const res = await apiFetch(`/job-status/${requestId}`);

          if (res.status === "done" && ((res.images && res.images.length > 0) || (res.result?.image_urls && res.result.image_urls.length > 0))) {
            pollSingleMatrixCellBackground(requestId, cell);
            return true;
          }

          if (res.task_uuids && res.task_uuids.length > 0) {
            pollSingleMatrixCellBackground(requestId, cell);
            return true;
          }
          if (res.status === "running" || res.status === "queued") {
            // The job is alive; hand off and let the background poll finish it.
            pollSingleMatrixCellBackground(requestId, cell);
            return true;
          }
          if (res.status === "error") {
            if (cell) {
              cell.querySelector(".loader").classList.add("hidden");
              cell.style.boxShadow = "inset 0 0 40px rgba(239, 68, 68, 0.2)";
            }
            return false;
          }
        } catch (err) { }
        await sleep(1000);
      }
      pollSingleMatrixCellBackground(requestId, cell);
      return false;
    }

    async function pollSingleMatrixCellBackground(requestId, cell, maxAttempts = 50) {
      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        try {
          const res = await apiFetch(`/job-status/${requestId}`);
          if (res.status === "done" && res.images && res.images.length > 0) {
            const urls = res.images.map(img => img.r2_url);
            updateMatrixCell(cell, urls, requestId);
            return;
          }
          if (res.status === "error") return;
        } catch (e) { }
        await sleep(3000);
      }
    }




    async function runGeneration() {
      setView("generate");
      toggleConsole("expand");
      dom.gallery.style.display = "";
      document.getElementById("matrixGallery").classList.remove("grid");
      document.getElementById("matrixGallery").classList.add("hidden");

      const payload = getPayload();
      if (!payload.prompt) return setFooterMsg("Inspiration required.", "error");

      setLoading(true);
      state.isGenerating = true; // Lock internal updates
      setProgress(0);
      dom.gallery.innerHTML = '<div class="col-span-full py-24 animate-pulse opacity-50 cinematic-text text-2xl uppercase tracking-widest text-center">Weaving Vision...</div>';

      try {
        setProgress(1);
        const res = await apiFetch("/generate", {
          method: "POST",
          body: JSON.stringify(payload)
        });
        saveActiveRequest(res.request_id);
        state.activeRequest = res;
        updateTasksView(res);
        setProgress(2);
        if (res.status === "done" && res.result?.image_urls?.length) {
          handleSuccess(res.result.image_urls, res.request_id, payload, res);
          return;
        }
        setFooterMsg(`Request accepted: ${res.request_id.slice(0, 8)}...`, "info");
        await pollUntilDone(res.request_id, payload);
      } catch (err) {
        console.error(err);
        setFooterMsg(`Generation failed to start: ${err.message}`, "error");
        setProgress(-1);
      } finally {
        setLoading(false);
        state.isGenerating = false; // Release internal updates
        if (window.innerWidth < 1024) toggleConsole("minimize");
      }
    }

    async function pollUntilDone(requestId, payload, maxAttempts = 120) {
      state.currentPoll = requestId;

      // 1. Initial quick poll
      try {
        const res = await apiFetch(`/job-status/${requestId}`);
        state.activeRequest = res;
        updateTasksView(res);
      } catch (e) { }

      // 2. Patience for 60s
      setFooterMsg("Manifesting spirit... focus for 60s.", "info");
      await sleep(60000);
      if (state.currentPoll !== requestId) return false;

      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        if (state.currentPoll !== requestId) return false;
        try {
          const res = await apiFetch(`/job-status/${requestId}`);
          if (state.currentPoll !== requestId) return false;
          state.activeRequest = res;
          updateTasksView(res);
          if (res.images && res.images.length > 0) {
            const urls = res.images.map(img => img.r2_url);
            if (urls.length > (dom.gallery.querySelectorAll(".bubble").length)) {
              renderGallery(urls, requestId, payload, res);
            }
          }
          if (res.status === "done") {
            const finalUrls = res.images?.length ? res.images.map(img => img.r2_url) : res.result?.image_urls;
            if (finalUrls) {
              setProgress(3);
              handleSuccess(finalUrls, requestId, payload, res);
              setTimeout(() => setProgress(-1), 3000);
              return true;
            }
          }
          if (res.status === "error") {
            setFooterMsg(res.error || "Generation failed.", "error");
            setProgress(-1);
            return false;
          }
        } catch (err) {
          // console.warn("poll error", err);
        }
        await sleep(backoffDelay(attempt));
      }
      return false;
    }

    function backoffDelay(attempt) {
      return Math.min(8000, 2000 + (attempt * 300));
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    async function resumeLastRequest() {

          handleSuccess(urls, state.activeRequestId, res, res);
          return;
        }
        await pollUntilDone(state.activeRequestId, res);
      } catch (err) {

      }
    }

    function popBubble(el, url, data, batchUrls = []) {
      const canvas = el.querySelector("canvas");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      const particles = [];
      for (let i = 0; i < 30; i++) {
        particles.push({ x: 130, y: 130, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10, size: Math.random() * 3, alpha: 1 });
      }
      const animate = () => {
        ctx.clearRect(0, 0, 260, 260);
        particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.alpha -= 0.03; ctx.fillStyle = `rgba(139, 92, 246, ${Math.max(0, p.alpha)})`; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); });
        if (particles[0].alpha > 0) requestAnimationFrame(animate);
      };
      animate();
      setTimeout(() => {
        const reveal = document.getElementById("bubbleReveal");
        document.getElementById("bubbleRevealImg").src = url;
        document.getElementById("bubbleRevealDownload").href = url;
        populateInspector(data);

        // Populate Thumbs if batch exists
        const thumbsSection = document.getElementById("thumbsSection");

        if (batchUrls.length > 1) {

             <button class="art-frame overflow-hidden border-2 border-transparent hover:border-[var(--accent)] transition-all ${u === url ? 'border-[var(--accent)]' : ''}"

          thumbsSection.style.display = "none";
        }

        reveal.style.display = "flex";
        setTimeout(() => reveal.classList.add("active"), 10);
      }, 150);
    }

                img.style.filter = ""; img.style.opacity = "1"; img.style.transform = "";
              }
              updateVaultCache();
            }, 900);
          })
          .catch(e => {
            setFooterMsg("Banishment fractured.", "error");
            img.style.filter = ""; img.style.opacity = "1"; img.style.transform = "";
          });
      });
    }

    async function banishBatch() {
      const data = state.__inspected_data;
      if (!data || !data.request_id) return;
      const requestId = data.request_id;

      openConfirm("Banish Entire Batch?", "Return all 4 spirits in this manifestation to the void.", async () => {
        const viewerContainer = document.querySelector('.image-viewer-container');
        const revealPanel = document.querySelector('.glass-reveal-panel');

        if (viewerContainer) {
          viewerContainer.style.transition = "all 1s cubic-bezier(0.4, 0, 0.2, 1)";
          viewerContainer.style.filter = "grayscale(1) blur(80px)";
          viewerContainer.style.opacity = "0";
          viewerContainer.style.transform = "scale(0.9)";
        }
        if (revealPanel) {
          revealPanel.style.transition = "all 0.8s ease";
          revealPanel.style.opacity = "0";
          revealPanel.style.transform = "translateX(20px)";
        }

        apiFetch(`/history/batch/${requestId}`, { method: 'DELETE' })
          .then(() => {
            setFooterMsg("Batch banished.", "info");
            const vaultCard = document.getElementById(`batch-${requestId}`);
            if (vaultCard) {
              vaultCard.style.transition = "all 0.8s cubic-bezier(0.4, 0, 0.2, 1)";
              vaultCard.style.opacity = "0";
              vaultCard.style.transform = "scale(0.8) translateY(30px)";
              setTimeout(() => vaultCard.remove(), 800);
            }
            updateVaultCache();
            setTimeout(() => { closeBubbleReveal(); }, 1000);
          })
          .catch(e => {
            setFooterMsg("Banishment failed.", "error");
            if (viewerContainer) { viewerContainer.style.filter = ""; viewerContainer.style.opacity = "1"; viewerContainer.style.transform = ""; }
            if (revealPanel) { revealPanel.style.opacity = "1"; revealPanel.style.transform = ""; }
          });
      });
    }


    async function loadHistoryPage() {
      if (state.loadingHistory || !state.historyHasMore) return;
      state.loadingHistory = true;
      if (dom.loadMoreBtn) dom.loadMoreBtn.textContent = "Summoning...";

      let renderedInThisPass = 0;
      console.group("Vault Load Operation");

      try {
        while (renderedInThisPass < state.historyLimit && state.historyHasMore) {
          const realmQ = state.vaultRealm ? `&realm=${state.vaultRealm}` : "";
          const cacheBuster = `&_t=${Date.now()}`;
          const fetchUrl = `/history?page=${state.historyPage}&limit=${state.historyLimit}${realmQ}${cacheBuster}`;
          console.log(`[Vault] Fetching Page ${state.historyPage}:`, fetchUrl);

          const res = await apiFetch(fetchUrl);
          const items = res.items || [];
          console.log(`[Vault] Received ${items.length} items from backend`, items);

          state.historyHasMore = !!res.has_more;
          state.historyPage += 1;

          let validInBatch = 0;
          let duplicates = 0;
          let ghostCount = 0;

          for (const entry of items) {
            if (state.vaultRealm && entry.realm && entry.realm.toLowerCase() !== state.vaultRealm.toLowerCase()) continue;

            if (!entry.images || entry.images.length === 0) {
              ghostCount++;
              continue;
            }

            if (document.getElementById(`batch-${entry.request_id}`)) {
              duplicates++;
              continue;
            }

            dom.historyList.appendChild(createBatchCard(entry));
            renderedInThisPass++;
            validInBatch++;
          }

          console.log(`[Vault] Page ${state.historyPage - 1} Summary -> Valid: ${validInBatch}, Ghosts: ${ghostCount}, Duplicates: ${duplicates}`);
        }
      } catch (err) {
        console.error("Vault load error:", err);
        if (dom.loadMoreBtn) dom.loadMoreBtn.textContent = "Error (Retry)";
      } finally {
        console.groupEnd();
        state.loadingHistory = false;
      }

      // Finalize UI
      const totalCardsVisible = dom.historyList.children.length;
      if (dom.loadMoreBtn) {
        if (!state.historyHasMore) {
          dom.loadMoreBtn.classList.remove("hidden");
          dom.loadMoreBtn.disabled = true;
          dom.loadMoreBtn.textContent = `End of Vault (${totalCardsVisible} Total)`;
          dom.loadMoreBtn.style.opacity = "0.5";
          dom.loadMoreBtn.style.cursor = "default";
        } else {
          dom.loadMoreBtn.classList.remove("hidden");
          dom.loadMoreBtn.disabled = false;
          dom.loadMoreBtn.style.opacity = "1";
          dom.loadMoreBtn.style.cursor = "pointer";
          dom.loadMoreBtn.textContent = `Load More (${totalCardsVisible} shown)`;
        }
      }
      setFooterMsg(`Loaded batches. Total visible: ${totalCardsVisible}`, "info");
    }

    async function renderHistory(reset = false) {
      if (!dom.historyList || document.getElementById("view-history").classList.contains("hidden")) return;

      if (state.historyLoaded && !reset && dom.historyList.innerHTML !== "") return;

      state.historyLoaded = true;
      state.historyPage = 1;
      state.historyHasMore = true;
      dom.historyList.innerHTML = "";
      dom.historyList.style.opacity = "1";
      dom.historyList.style.pointerEvents = "auto";

      await loadHistoryPage();
    }

    // The Oracle Module
    const ORACLE_PROMPTS = [
      "(masterpiece, best quality:1.2), an ethereal glass cathedral floating in a nebula, hyper-detailed, incredibly beautiful, cinematic lighting",
      "A cyberpunk neo-tokyo street vendor selling glowing mechanical cyber-pets, neon rim lighting, dynamic angle, rain, 8k resolution",
      "Macro photography of a tiny bioluminescent forest growing inside a cracked glowing crystal ball, unreal engine 5 render, highly detailed",
      "A dark fantasy warrior king made entirely of living shadow and smoke, holding a sword of starlight, dramatic stormy background, greg rutkowski style",
      "(intricate details:1.1), portrait of a cybernetic angel with wings made of fiber optic cables, glowing datastreams, trending on artstation",
      "A lush, overgrown sci-fi greenhouse on a spaceship overlooking a black hole, volumetric fog, cinematic colors"
    ];

    function rollOracle() {
      const idx = Math.floor(Math.random() * ORACLE_PROMPTS.length);
      dom.prompt.value = ORACLE_PROMPTS[idx];
      dom.negativePrompt.value = "worst quality, low quality, bad anatomy, deformed, watermark, signature";
      dom.aspect.value = "16:9";
      dom.quality.value = "High Quality";
      setFooterMsg("The Oracle has spoken.", "info");
    }

    // Aether Particles Overlay
    function initAetherCanvas() {
      const canvas = document.getElementById('aetherCanvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      const particles = [];

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      window.addEventListener('resize', resize);
      resize();

      for (let i = 0; i < 40; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          size: Math.random() * 2 + 0.5,
          shift: Math.random() * Math.PI * 2
        });
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        // Color shifts based on mode (Day = Emerald/White, Star = Violet)
        const isNsfw = state.activeMode === "nsfw";

        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          p.shift += 0.01;

          if (p.x < 0) p.x = width;
          if (p.x > width) p.x = 0;
          if (p.y < 0) p.y = height;
          if (p.y > height) p.y = 0;

          const alpha = (Math.sin(p.shift) * 0.3) + 0.3;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = isNsfw ? `rgba(139, 92, 246, ${alpha})` : `rgba(16, 185, 129, ${alpha})`;
          ctx.fill();
        });
        requestAnimationFrame(animate);
      }
      animate();
    }
    initAetherCanvas();

    function clearVault() { if (confirm("Clear local cache?")) { localStorage.removeItem("a_vault_cache"); dom.historyList.innerHTML = ""; reloadHistory(); } }
    function clearPrompt() { dom.prompt.value = ""; dom.negativePrompt.value = ""; setFooterMsg("Vision cleared.", "info"); }
    function pastePrompt() { navigator.clipboard.readText().then(text => dom.prompt.value = text); }
    function toggleConsole(forceState) {
      const el = document.getElementById("desktopConsole");
      const stub = document.getElementById("mobileToggleStub");
      let isMin = el.classList.contains("minimized");
      if (forceState === "expand") isMin = false;
      else if (forceState === "minimize") isMin = true;
      else isMin = !isMin;

      el.classList.toggle("minimized", isMin);
      document.getElementById("consoleToggleText").textContent = isMin ? "Expand" : "Minimize";
      if (stub) stub.style.display = isMin ? "block" : "none";
    }
    function reloadHistory() {
      state.historyLoaded = false;
      state.historyPage = 0;
      dom.historyList.innerHTML = "";
      renderHistory();
    }
    async function copyRequestId(id) { if (id) { await navigator.clipboard.writeText(id); setFooterMsg("Copied ID.", "info"); } }
    function escapeHtml(v) { return String(v).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
    async function checkBackend() { try { const res = await apiFetch("/health"); dom.backendStatus.textContent = res.status === "ok" ? "Backend Online" : "Backend Latency"; } catch { dom.backendStatus.textContent = "Backend Offline"; } }

    function setView(v) {
      document.querySelectorAll(".view").forEach(el => el.classList.add("hidden"));
      const viewEl = document.getElementById(`view-${v}`);
      if (viewEl) viewEl.classList.remove("hidden");
      document.querySelectorAll("[data-view]").forEach(b => {
        const isMatch = b.dataset.view === v;
        b.classList.toggle("active", isMatch);
        b.classList.toggle("bg-white/20", isMatch && !b.classList.contains("mobile-nav-item"));
        b.classList.toggle("opacity-100", isMatch);
        b.classList.toggle("opacity-60", !isMatch);
      });
      if (v === "history") renderHistory();

      // Auto-minimize on mobile for non-forge tabs
      if (window.innerWidth < 1024 && (v === "history" || v === "tasks")) {
        toggleConsole("minimize");
      }
    }

    document.querySelectorAll("[data-view]").forEach(btn => btn.addEventListener("click", (e) => setView(e.currentTarget.dataset.view)));

    document.querySelectorAll("[data-mode]").forEach(btn => btn.addEventListener("click", () => applyMode(btn.dataset.mode)));
    dom.generateBtn.addEventListener("click", runGeneration);

    try {
      applyMode(state.activeMode);
      renderActiveRequest();
      checkBackend(); // Only one check on load
    } catch (e) {
      console.error("Initialization error:", e);
      setFooterMsg("Connect to Server for full functionality.", "info");
    }
  </script>
  <div id="progressMatrix"
    class="fixed top-0 left-0 right-0 h-1 z-[10000] pointer-events-none opacity-0 transition-opacity duration-500 flex gap-1">
    <div class="progress-step flex-1 h-full"></div>
    <div class="progress-step flex-1 h-full"></div>
    <div class="progress-step flex-1 h-full"></div>
    <div class="progress-step flex-1 h-full"></div>
  </div>
</body>
