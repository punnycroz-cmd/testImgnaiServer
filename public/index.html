<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether Studio | Elite Forge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800&display=swap');

    :root {
      --bg-base: #f1f7f4;
      --panel-bg: rgba(255, 255, 255, 0.55);
      --panel-border: rgba(255, 255, 255, 0.7);
      --panel-shadow: rgba(0, 50, 20, 0.1);
      --text-main: #10243a;
      --text-muted: #64748b;
      --accent: #10b981;
      --accent-hover: #059669;
      --accent-glow: rgba(16, 185, 129, 0.4);
      --accent-text: #fff;
    }

    body[data-mode="nsfw"] {
      --bg-base: #0f172a;
      --panel-bg: rgba(15, 23, 42, 0.62);
      --panel-border: rgba(255, 255, 255, 0.12);
      --panel-shadow: rgba(0, 0, 0, 0.5);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #8b5cf6;
      --accent-hover: #7c3aed;
      --accent-glow: rgba(139, 92, 246, 0.5);
      --accent-text: #fff;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background:
        radial-gradient(circle at top, rgba(16, 185, 129, 0.12), transparent 70%),
        linear-gradient(180deg, var(--bg-base), var(--bg-base));
      color: var(--text-main);
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s ease;
    }

    body[data-mode="nsfw"] {
        background:
        radial-gradient(circle at top, rgba(139, 92, 246, 0.12), transparent 70%),
        linear-gradient(180deg, var(--bg-base), var(--bg-base));
    }

    h1, h2, h3, .cinematic-text {
      font-family: 'Cinzel', serif;
    }

    .glass-panel {
      background: var(--panel-bg);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--panel-border);
      box-shadow: 0 20px 40px var(--panel-shadow);
      border-radius: 2rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .nav-pill {
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      color: var(--text-muted);
      cursor: pointer;
    }

    .nav-pill.active {
      color: var(--accent-text);
      background: var(--accent);
      box-shadow: 0 10px 25px var(--accent-glow);
      transform: translateY(-1px);
    }

    textarea, select, input {
      background: var(--panel-bg) !important;
      border: 1px solid var(--panel-border) !important;
      color: var(--text-main) !important;
      border-radius: 1rem !important;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
    }

    textarea:focus, select:focus, input:focus {
      outline: none !important;
      box-shadow: 0 0 0 3px var(--accent-glow) !important;
      border-color: var(--accent) !important;
    }

    .btn-magic {
      background: var(--accent);
      color: var(--accent-text);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      border-radius: 1.25rem;
      cursor: pointer;
    }

    .btn-magic:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 14px 32px var(--accent-glow);
      transform: translateY(-2px) scale(1.02);
    }

    .btn-magic:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .loader {
      width: 18px; height: 18px; border: 2px solid white; border-top-color: transparent; border-radius: 999px;
      animation: spin 0.8s cubic-bezier(0.6, 0.2, 0.4, 0.8) infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes float { from { transform: translateY(0px); } to { transform: translateY(-14px); } }
    
    @keyframes slideUpFade { 
        from { opacity: 0; transform: translateY(20px) scale(0.98); } 
        to { opacity: 1; transform: translateY(0) scale(1); } 
    }

    main {
      padding-top: 8rem; padding-bottom: 22rem; overflow-y: auto; height: 100vh; scrollbar-width: none;
    }

    @media (max-width: 768px) {
      html { font-size: 14px; }
      h2.cinematic-text { font-size: 1.75rem !important; }
      main { padding-top: 7.5rem; padding-bottom: 38rem; }
      .bottom-console { bottom: 5rem !important; }
    }

    .mobile-nav-item svg { width: 20px; height: 20px; margin-bottom: 4px; }
    .mobile-nav-item.active { color: var(--accent); }
    main::-webkit-scrollbar { width: 0; }

    .bubble-container {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.5rem; padding: 1.5rem; max-width: 1200px; margin: 0 auto;
    }

    .bubble {
      width: 100%; aspect-ratio: 1 / 1; border-radius: 50%; position: relative; cursor: pointer;
      animation: float 4s infinite alternate ease-in-out, slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
      overflow: hidden; isolation: isolate;
    }

    .bubble-img-overlay { position: absolute; inset: 0; border-radius: 50%; overflow: hidden; z-index: 1; transition: transform 0.4s ease; }
    .bubble:hover .bubble-img-overlay { transform: scale(1.05); }
    .bubble-img-overlay img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    .bubble-sphere {
      width: 100%; height: 100%; border-radius: 50%; position: absolute; inset: 0; z-index: 2;
      background: radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.42) 0%, transparent 60%);
      border: 1px solid rgba(255, 255, 255, 0.18); transition: box-shadow 0.3s ease; pointer-events: none;
    }
    .bubble:hover .bubble-sphere { box-shadow: inset -10px -10px 30px rgba(0,0,0,0.1), 0 20px 45px var(--accent-glow); border: 2px solid var(--accent); }

    .bubble-canvas { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; border-radius: 50%; z-index: 50; width: 260px; height: 260px; }

    .vault-badge {
      position: absolute; top: 12px; right: 12px; background: var(--accent); color: white; font-size: 8px; font-weight: 800; padding: 2px 8px; border-radius: 999px;
      z-index: 10; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 10px var(--accent-glow);
    }

    .art-frame {
      border-radius: 1.25rem; overflow: hidden; position: relative; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      background: var(--panel-bg); cursor: pointer; border: 2px solid transparent;
      animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
    }

    .art-frame:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 15px 35px var(--accent-glow); }
    .art-frame img { transition: transform 0.6s ease; }
    .art-frame:hover img { transform: scale(1.05); }

    #bubbleReveal {
      position: fixed; inset: 0; z-index: 9999; display: none; opacity: 0; flex-direction: column; align-items: center; justify-content: flex-start;
      background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(0px); padding: 1rem; gap: 2rem;
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), backdrop-filter 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #bubbleReveal.active { display: flex !important; opacity: 1; backdrop-filter: blur(20px); }

    #bubbleReveal img { max-height: 55vh; width: auto; max-width: 100%; object-fit: contain; border-radius: 1.25rem; transform: scale(0.92); transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
    #bubbleReveal.active img { transform: scale(1); }

    @media (min-width: 1024px) {
      #bubbleReveal { flex-direction: row; padding: 4rem; gap: 4rem; justify-content: center; }
      #bubbleReveal .image-viewer-container { flex: 7; display: flex; justify-content: center; align-items: center; max-height: 85vh; }
      #bubbleReveal img { max-height: 85vh; }
      .glass-reveal-panel { flex: 3; max-width: 450px; min-width: 350px; height: min-content; max-height: 85vh; overflow-y: auto; }
    }

    .glass-reveal-panel {
      background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 28px;
      transform: translateY(40px) scale(0.95); opacity: 0; transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease; color: white;
    }
    #bubbleReveal.active .glass-reveal-panel { transform: translateY(0) scale(1); opacity: 1; }

    .status-pill {
      display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.35rem 0.7rem; border-radius: 999px;
      background: rgba(255, 255, 255, 0.08); color: var(--text-muted); font-size: 11px; font-weight: 700; letter-spacing: 0.03em; border: 1px solid var(--panel-border);
    }

    .bottom-console {
      position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%); width: calc(100% - 1.5rem); max-width: 1100px; z-index: 100;
      transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease; will-change: transform, opacity;
    }

    .bottom-console.minimized { transform: translate(-50%, calc(100%)); opacity: 0; pointer-events: none; }

    @media (min-width: 1024px) {
      .bottom-console.minimized { transform: translate(-50%, calc(100% - 1rem)); opacity: 0.9; pointer-events: auto; }
      .bottom-console.minimized #consoleToggleBtn { top: -45px; opacity: 1; }
    }

    /* Progress Matrix Refined Animation */
    .progress-matrix { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-top: 1rem; opacity: 0; transition: opacity 0.4s ease; }
    .progress-matrix.active { opacity: 1; }
    .progress-step { height: 4px; background: var(--panel-border); border-radius: 999px; position: relative; overflow: hidden; }
    .progress-step.done { background: var(--accent); }
    .progress-step.active::after {
      content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: pulse-sweep 1.5s infinite linear;
    }

    @keyframes pulse-sweep {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
  </style>
</head>

<body data-mode="standard">
  <canvas id="aetherCanvas" class="fixed inset-0 pointer-events-none z-[-1]"></canvas>

  <header class="fixed top-5 left-0 right-0 z-[110] px-4 sm:px-8">
    <div class="max-w-7xl mx-auto glass-panel p-4 border-t-4 border-t-[var(--accent)] flex items-center justify-between gap-4 shadow-2xl">
      <div class="flex items-center gap-4 min-w-0">
        <div class="w-10 h-10 rounded-xl bg-[var(--accent)] text-white flex items-center justify-center shadow-lg transform -rotate-3 shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
          </svg>
        </div>
        <div class="min-w-0">
          <h1 class="text-2xl sm:text-3xl font-black cinematic-text tracking-[0.3em] truncate text-[var(--accent)]">AETHER WORLD</h1>
        </div>
      </div>

      <nav class="hidden sm:flex items-center gap-2 bg-black/5 p-1 rounded-2xl shrink-0">
        <button data-view="generate" class="nav-pill active px-4 sm:px-5 py-2 rounded-xl font-bold uppercase text-[10px] tracking-widest">Forge</button>
        <button data-view="history" class="nav-pill px-4 sm:px-5 py-2 rounded-xl font-bold uppercase text-[10px] tracking-widest">Vault</button>
      </nav>

      <div class="hidden sm:flex items-center gap-2">
         <span id="activeRequestBadge" class="status-pill hidden font-bold text-[var(--accent)]"></span>
         <div class="status-pill" id="backendStatus">Checking backend...</div>
      </div>
    </div>
  </header>

  <div id="bubbleReveal" class="fixed inset-0 z-[2000] hidden flex-col items-center justify-start p-4 pt-12 sm:p-12 bg-black/80 backdrop-blur-md overflow-y-auto" onclick="closeBubbleReveal(event)">
    <div class="image-viewer-container w-full relative flex items-center justify-center my-4 pb-4" onclick="event.stopPropagation()">
      <img id="bubbleRevealImg" src="" alt="Manifestation" class="shadow-[0_20px_80px_rgba(0,0,0,0.9)] border border-white/10 hover:scale-[1.01]">
    </div>

    <div class="glass-reveal-panel w-full p-8 sm:p-10 flex flex-col gap-6 shadow-2xl mb-24 sm:mb-0" onclick="event.stopPropagation()">
      <div id="thumbsSection" class="hidden flex-col gap-3">
        <span class="opacity-60 uppercase font-black text-[9px] tracking-[0.2em] mb-1 text-[var(--accent)]">The Batch</span>
        <div id="bubbleRevealThumbs" class="grid grid-cols-4 gap-2"></div>
      </div>

      <div id="metaInspector" class="grid grid-cols-2 gap-8 border-t border-white/10 pt-6">
        <div class="flex flex-col"><span class="opacity-60 uppercase font-black text-[10px] tracking-[0.2em] mb-2 text-[var(--accent)]">Casting Engine</span><span class="font-bold text-lg tracking-tight" id="metaModel">-</span></div>
        <div class="flex flex-col items-end"><span class="opacity-60 uppercase font-black text-[10px] tracking-[0.2em] mb-2 text-[var(--accent)]">Celestial Realm</span><span class="font-bold text-white text-lg uppercase tracking-wide" id="metaRealm">-</span></div>
        <div class="col-span-2 pt-6 border-t border-white/10">
          <span class="opacity-60 uppercase font-black text-[10px] tracking-[0.2em] mb-3 block text-[var(--accent)]">Inscription</span>
          <p id="metaPrompt" class="text-base sm:text-lg leading-relaxed text-white font-medium italic tracking-tight">-</p>
        </div>
      </div>

      <div class="grid grid-cols-2 lg:grid-cols-3 gap-3 pt-6 border-t border-white/5">
        <a id="bubbleRevealDownload" href="#" download class="btn-magic h-12 flex items-center justify-center rounded-xl text-[10px] font-black uppercase tracking-[0.15em] shadow-2xl">Collect</a>
        <button onclick="cloneActiveManifestation()" class="h-12 rounded-xl border-2 border-[var(--accent)] text-[var(--accent)] hover:bg-[var(--accent)] hover:text-white transition-all text-[10px] font-black uppercase tracking-[0.15em]">Invoke</button>
        <button onclick="closeBubbleReveal()" class="h-12 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 text-[10px] font-black uppercase tracking-[0.15em] hidden lg:block">Close</button>

        <div class="col-span-2 lg:col-span-3 grid grid-cols-2 gap-3 mt-1">
          <button onclick="banishCurrentItem()" class="h-12 rounded-xl bg-red-500/10 border border-red-500/20 text-red-500 hover:bg-red-500 hover:text-white transition-all text-[10px] font-black uppercase tracking-[0.15em]">Banish Batch</button>
          <button onclick="closeBubbleReveal()" class="h-12 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 text-[10px] font-black uppercase tracking-[0.15em] lg:hidden col-span-2">Close</button>
        </div>
      </div>
    </div>
  </div>

  <main id="mainContent">
    <section id="view-generate" class="view">
      <div class="max-w-7xl mx-auto px-4 sm:px-8">

        <div id="gallery" class="bubble-container">
          <div id="galleryEmpty" class="col-span-full py-20 text-center opacity-15 text-3xl font-light cinematic-text tracking-[0.3em] uppercase">Void Awaiting Light</div>
        </div>

        <div id="matrixControls" class="hidden flex items-center justify-between gap-4 py-4 px-2 bg-white/5 rounded-2xl border border-white/10 mb-4 animate-in fade-in slide-in-from-top-4 duration-500">
          <div class="flex items-center gap-3">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse" id="matrixStatusPulse"></span>
            <span class="text-[10px] font-black uppercase tracking-widest" id="matrixStatusText">Matrix Active</span>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="toggleMatrixPause()" id="matrixPauseBtn" class="px-4 py-2 rounded-lg bg-white/10 hover:bg-white/20 text-[9px] font-black uppercase tracking-widest transition-all">Pause</button>
            <button onclick="cancelMatrix()" class="px-4 py-2 rounded-lg bg-red-500/10 hover:bg-red-500/20 text-red-500 text-[9px] font-black uppercase tracking-widest transition-all border border-red-500/20">Cancel</button>
          </div>
        </div>
        <div id="matrixGallery" class="hidden grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 py-8"></div>
      </div>
    </section>

    <section id="view-history" class="view hidden px-4 sm:px-8">
      <div class="max-w-7xl mx-auto min-h-[400px] relative">
        <div class="flex flex-col sm:flex-row items-center justify-between gap-6 mb-10">
          <div class="flex items-center gap-2 bg-black/10 p-1.5 rounded-2xl border border-white/5">
            <div class="px-6 py-2.5 rounded-xl font-bold text-[10px] uppercase tracking-widest transition-all bg-[var(--accent)] text-white shadow-lg">All Batches</div>
          </div>
          <div class="flex items-center gap-4">
            <button onclick="toggleSelectionMode()" id="toggleSelectBtn" class="text-[10px] font-bold uppercase tracking-widest opacity-60 hover:opacity-100">Select Mode</button>
            <div class="w-px h-4 bg-white/10"></div>
            <button onclick="reloadHistory()" class="text-[10px] font-bold uppercase tracking-widest text-[var(--accent)]">Reload</button>
            <button onclick="clearVault()" class="text-[10px] font-bold uppercase text-red-500 hover:opacity-70">Purge Cache</button>
          </div>
        </div>

        <div id="historyList" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 transition-all" data-select-mode="false"></div>
        <div class="mt-8 flex justify-center">
          <button id="loadMoreBtn" onclick="loadHistoryPage()" class="btn-magic px-6 py-4 text-[10px] font-bold uppercase tracking-widest shadow-xl hidden">Load More</button>
        </div>
      </div>
    </section>
  </main>

  <div id="desktopConsole" class="bottom-console glass-panel p-4 border-2 border-[var(--accent)]">
    <button onclick="toggleConsole()" id="consoleToggleBtn" class="absolute -top-10 left-1/2 -translate-x-1/2 bg-[var(--accent)] text-white px-6 py-2 rounded-t-xl font-bold text-[10px] uppercase tracking-widest shadow-lg">
      <span id="consoleToggleText">Minimize</span>
    </button>

    <div class="grid grid-cols-12 gap-4 items-stretch">
      <div class="col-span-12 lg:col-span-4 flex flex-col gap-3">
        <div class="flex items-center gap-1 bg-black/5 p-1 rounded-xl h-9">
          <button data-mode="standard" class="nav-pill active w-1/2 h-full rounded-lg text-[9px] font-bold uppercase">Day</button>
          <button data-mode="nsfw" class="nav-pill w-1/2 h-full rounded-lg text-[9px] font-bold uppercase">Star</button>
        </div>
        <div id="starTestToggleContainer" class="hidden flex items-center gap-2 ml-1">
          <input type="checkbox" id="useStarTest" class="rounded border-white/10 bg-black/20 text-[var(--accent)] focus:ring-[var(--accent)] focus:ring-offset-black">
          <label for="useStarTest" class="text-[9px] font-bold uppercase opacity-70">Use Safe Engine (Subprocess)</label>
        </div>
        <div class="space-y-1">
          <label class="text-[9px] font-bold uppercase opacity-50 ml-1">Engine</label>
          <select id="model" class="w-full h-9 px-3 font-bold text-xs cursor-pointer"></select>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="space-y-1">
            <label class="text-[9px] font-bold uppercase opacity-50 ml-1">Quality</label>
            <select id="quality" class="w-full h-9 px-3 font-bold text-xs cursor-pointer"></select>
          </div>
          <div class="space-y-1">
            <label class="text-[9px] font-bold uppercase opacity-50 ml-1">Size</label>
            <select id="aspect" class="w-full h-9 px-3 font-bold text-xs cursor-pointer"></select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div class="space-y-1">
            <label class="text-[9px] font-bold uppercase opacity-50 ml-1">Images</label>
            <select id="count" class="w-full h-9 px-3 font-bold text-xs cursor-pointer">
              <option value="1">1 Spirit</option>
              <option value="4" selected>4 Spirits</option>
            </select>
          </div>
          <div class="space-y-1">
            <label class="text-[9px] font-bold uppercase opacity-50 ml-1">Seed</label>
            <input id="seed" type="number" placeholder="Divine Seed" class="w-full h-9 px-3 font-bold text-xs">
          </div>
        </div>
      </div>

      <div class="col-span-12 lg:col-span-8 flex flex-col gap-3">
        <div class="flex-1 flex flex-col space-y-1">
          <div class="flex justify-between px-1">
            <label class="text-[9px] font-bold uppercase opacity-50">The Vision</label>
            <div class="flex gap-4 items-center">
              <button onclick="clearPrompt()" class="px-2 py-1 text-[10px] font-bold text-red-500 uppercase">Clear</button>
              <button onclick="pastePrompt()" class="px-2 py-1 text-[10px] font-bold text-[var(--text-main)] uppercase">Paste</button>
              <button onclick="rollOracle()" class="px-3 py-1.5 text-[10px] font-bold text-[var(--accent)] uppercase flex items-center gap-1.5 hover:bg-[var(--accent)] hover:text-white transition-all border border-[var(--accent)] rounded-lg">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                  <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
                </svg> Oracle
              </button>
            </div>
          </div>
          <textarea id="prompt" placeholder="What do you seek to manifest?" class="w-full flex-1 p-3 resize-none text-sm leading-relaxed font-medium"></textarea>
        </div>
        <div class="grid grid-cols-6 gap-3">
          <div class="col-span-3">
            <textarea id="negativePrompt" placeholder="Wards (Banish artifacts...)" class="w-full h-11 px-3 py-2 text-xs resize-none font-medium"></textarea>
          </div>
          <button id="matrixBtn" onclick="runMatrixCast()" class="col-span-1 rounded-xl border-2 border-[var(--accent)] text-[var(--accent)] hover:bg-[var(--accent)] hover:text-white transition-colors flex items-center justify-center font-bold uppercase text-[10px] tracking-widest shadow-lg min-h-[44px]">
            <span id="btnMatrixText">Matrix</span>
            <div id="btnMatrixLoader" class="hidden ml-2"><div class="loader" style="width:12px;height:12px;border-width:2px;animation-duration:2s"></div></div>
          </button>
          <button id="generateBtn" class="col-span-2 btn-magic flex items-center justify-center gap-2 font-bold uppercase text-[11px] tracking-widest shadow-lg min-h-[44px]">
            <span id="btnText">Manifest</span>
            <div id="btnLoader" class="hidden"><div class="loader"></div></div>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="footerStatus" class="fixed bottom-8 left-1/2 -translate-x-1/2 glass-panel py-3 px-8 text-xs font-bold transition-all translate-y-32 opacity-0 pointer-events-none z-[150] shadow-2xl border-white/20"></div>

  <!-- Mobile Nav -->
  <nav class="sm:hidden fixed bottom-0 left-0 right-0 z-[200] glass-panel p-4 rounded-b-none border-t border-[var(--panel-border)] flex items-center justify-around">
    <div id="mobileToggleStub" style="display: none; position: absolute; top: -42px; left: 50%; transform: translateX(-50%); z-1001;">
      <button onclick="toggleConsole()" class="bg-[var(--accent)] text-white px-8 py-2.5 rounded-t-2xl font-black text-[10px] uppercase tracking-[0.2em] shadow-2xl">Expand</button>
    </div>
    <button data-view="generate" class="mobile-nav-item flex flex-col items-center p-2 transition-all opacity-60 active">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
      <span class="text-[9px] font-black uppercase">Forge</span>
    </button>
    <button data-view="history" class="mobile-nav-item flex flex-col items-center p-2 transition-all opacity-60">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
      </svg>
      <span class="text-[9px] font-black uppercase">Vault</span>
    </button>
  </nav>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="fixed inset-0 z-[10000] hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-xl">
    <div class="glass-panel max-w-sm w-full p-8 flex flex-col gap-6 text-center animate-in zoom-in duration-300">
      <div class="flex justify-center">
        <div class="w-16 h-16 rounded-full bg-red-500/10 flex items-center justify-center border border-red-500/20">
          <svg class="w-8 h-8 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
        </div>
      </div>
      <div>
        <h3 id="confirmTitle" class="text-xl font-black uppercase tracking-[0.1em] text-white">Banish?</h3>
        <p id="confirmMsg" class="opacity-60 text-xs leading-relaxed mt-2 uppercase tracking-widest font-bold"></p>
      </div>
      <div class="grid grid-cols-2 gap-4 mt-2">
        <button id="confirmYes" class="bg-red-600 text-white py-4 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] hover:bg-red-500 transition-colors">Banish</button>
        <button onclick="closeConfirm()" class="bg-white/5 py-4 rounded-xl border border-white/10 font-black text-[10px] uppercase tracking-[0.2em] hover:bg-white/10 transition-colors">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Multi-Select Action Bar -->
  <div id="selectionBar" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-[10000] glass-panel p-5 px-10 border-2 border-[var(--accent)] flex flex-col sm:flex-row items-center gap-8 shadow-[0_50px_120px_rgba(0,0,0,1)] rounded-[2.5rem]">
    <div class="flex items-center gap-8">
      <div class="flex flex-col">
        <span id="selectCount" class="text-3xl font-black tracking-tighter text-[var(--accent)]">0</span>
        <span class="text-[10px] uppercase tracking-[0.2em] opacity-60 font-black">Spirits</span>
      </div>
      <div class="w-px h-12 bg-white/10"></div>
      <button onclick="executeBulkAction('delete')" class="bg-red-600 text-white px-8 py-4 rounded-3xl font-black text-[10px] uppercase tracking-[0.2em] shadow-2xl hover:bg-red-500 transition-all">Banish</button>
    </div>
    <button onclick="toggleSelectionMode(false)" class="text-[10px] font-black uppercase tracking-[0.2em] opacity-40 hover:opacity-100 transition-all">Cancel</button>
  </div>

  <div id="progressMatrix" class="fixed top-0 left-0 right-0 h-1 z-[10000] pointer-events-none opacity-0 transition-opacity duration-500 flex gap-1">
    <div class="progress-step flex-1 h-full"></div><div class="progress-step flex-1 h-full"></div><div class="progress-step flex-1 h-full"></div><div class="progress-step flex-1 h-full"></div>
  </div>

  <script>
    window.__SERVER_URL__ = "__SERVER_URL__";
    window.__SERVER_URL_NSFW__ = "__SERVER_URL_NSFW__";

    const DAY_MODELS = ["Ani", "Aura", "Evo", "Flux1 D", "Fur", "FurXL Classic", "Gen", "Glitch", "Gothic", "Hyper CGI", "HyperX", "Muse", "Nai", "Neo", "Noob", "Pixel", "Pony", "Rend", "Retro", "Supra", "Synth", "Toon", "Volt", "Wassie"];
    const STAR_MODELS = ["Gen", "Ani", "Synth", "Fur", "Noob", "Aura", "Pixel", "Hyper CGI", "Volt", "Muse", "Rend", "Pony", "Neo", "Nai", "Retro", "Supra", "Evo", "Toon", "HyperX", "FurXL Classic", "Illustrious", "Real Amateurs", "RealX", "Real Classic"];
    const ASPECT_CHOICES = ["1:1", "16:9", "5:2", "4:5", "4:7"];
    const QUALITY_CHOICES = ["Fast", "High Quality"];
    const ORACLE_PROMPTS = [
        "(masterpiece, best quality:1.2), an ethereal glass cathedral floating in a nebula, hyper-detailed, incredibly beautiful, cinematic lighting, 8k",
        "A cyberpunk neo-tokyo street vendor selling glowing mechanical cyber-pets, neon rim lighting, dynamic angle, rain, unreal engine 5",
        "Macro photography of a tiny bioluminescent forest growing inside a cracked glowing crystal ball, hyper-realistic, depth of field",
        "A dark fantasy warrior king made entirely of living shadow and smoke, holding a sword of starlight, dramatic stormy background, greg rutkowski style",
        "(intricate details:1.1), portrait of a cybernetic angel with wings made of fiber optic cables, glowing datastreams, trending on artstation"
    ];

    const state = {
      serverUrl: "",
      activeMode: localStorage.getItem("a_mode") || "standard",
      activeView: "generate",
      activeRequestId: localStorage.getItem("a_active_request_id") || "",
      activeRequest: null,
      historyPage: 1, historyCursor: null, historyLimit: 20, historyHasMore: true, historyLoaded: false, loadingHistory: false,
      currentPoll: null, selectionMode: false, selectedIds: new Set(),
      matrixPaused: false, matrixCancelled: false, activeUid: "uid_0", isGenerating: false
    };

    const dom = {
      model: document.getElementById("model"), prompt: document.getElementById("prompt"), negativePrompt: document.getElementById("negativePrompt"),
      generateBtn: document.getElementById("generateBtn"), btnText: document.getElementById("btnText"), btnLoader: document.getElementById("btnLoader"),
      gallery: document.getElementById("gallery"), historyList: document.getElementById("historyList"),
      count: document.getElementById("count"), aspect: document.getElementById("aspect"), quality: document.getElementById("quality"), seed: document.getElementById("seed"),
      footerStatus: document.getElementById("footerStatus"), loadMoreBtn: document.getElementById("loadMoreBtn"),
      activeRequestBadge: document.getElementById("activeRequestBadge"), backendStatus: document.getElementById("backendStatus"),
      matrixBtn: document.getElementById("matrixBtn"), btnMatrixText: document.getElementById("btnMatrixText"), btnMatrixLoader: document.getElementById("btnMatrixLoader")
    };

    function isUnresolved(v) { return !v || v.startsWith("__") || v.includes("REPLACE"); }
    function resolveServerUrl(mode) {
      const std = isUnresolved(window.__SERVER_URL__) ? window.location.origin : window.__SERVER_URL__;
      const nsfw = isUnresolved(window.__SERVER_URL_NSFW__) ? std : window.__SERVER_URL_NSFW__;
      return (mode === "nsfw" ? nsfw : std).replace(/\/$/, "");
    }

    function setFooterMsg(msg, kind = "info") {
      dom.footerStatus.textContent = msg;
      dom.footerStatus.style.borderColor = kind === "error" ? "rgba(239,68,68,0.35)" : "rgba(255,255,255,0.2)";
      dom.footerStatus.style.color = kind === "error" ? "#ef4444" : "var(--text-main)";
      dom.footerStatus.classList.remove("translate-y-32", "opacity-0");
      setTimeout(() => dom.footerStatus.classList.add("translate-y-32", "opacity-0"), 3500);
    }

    function setLoading(loading) {
      dom.generateBtn.disabled = loading;
      dom.btnText.textContent = loading ? "Weaving..." : "Manifest";
      dom.btnLoader.classList.toggle("hidden", !loading);
    }

    function saveActiveRequest(requestId) {
      state.activeRequestId = requestId || "";
      if (requestId) localStorage.setItem("a_active_request_id", requestId);
      else localStorage.removeItem("a_active_request_id");
      renderActiveRequest();
    }
    function renderActiveRequest() {
      if (!dom.activeRequestBadge) return;
      if (!state.activeRequestId) {
        dom.activeRequestBadge.classList.add('hidden');
      } else {
        dom.activeRequestBadge.classList.remove('hidden');
        dom.activeRequestBadge.textContent = `JOB: ${state.activeRequestId.slice(0, 8)}`;
      }
    }

    function applyMode(mode) {
      state.activeMode = mode;
      const starTestContainer = document.getElementById("starTestToggleContainer");
      if (mode === "nsfw") starTestContainer.classList.remove("hidden");
      else starTestContainer.classList.add("hidden");
      
      document.body.dataset.mode = mode;
      state.serverUrl = resolveServerUrl(mode);
      
      const previousModel = dom.model.value || localStorage.getItem("a_model") || "";
      const models = mode === "nsfw" ? STAR_MODELS : DAY_MODELS;
      
      dom.model.innerHTML = models.map(name => `<option value="${name}">${name}</option>`).join("");
      dom.quality.innerHTML = QUALITY_CHOICES.map(q => `<option value="${q}">${q}</option>`).join("");
      dom.aspect.innerHTML = ASPECT_CHOICES.map(a => `<option value="${a}">${a}</option>`).join("");
      
      document.querySelectorAll("[data-mode]").forEach(btn => btn.classList.toggle("active", btn.dataset.mode === mode));
      localStorage.setItem("a_mode", mode);
      
      dom.model.value = models.includes(previousModel) ? previousModel : (models[0] || "Gen");
      localStorage.setItem("a_model", dom.model.value);
    }

    function getPayload() {
      let realm = state.activeMode === "nsfw" ? "star" : "day";
      if (realm === "star" && document.getElementById("useStarTest").checked) realm = "star_test";
      return {
        prompt: dom.prompt.value.trim(), model: dom.model.value, nsfw: state.activeMode === "nsfw",
        count: parseInt(dom.count.value, 10), aspect: dom.aspect.value, quality: dom.quality.value,
        negative_prompt: dom.negativePrompt.value.trim(), seed: dom.seed.value ? parseInt(dom.seed.value, 10) : null,
        client_id: `client-${Date.now()}`, realm
      };
    }

    async function apiFetch(path, opts = {}) {
      try {
        const fetchOpts = { headers: { "Content-Type": "application/json" }, ...opts };
        const finalUrl = `${state.serverUrl.replace(/\/+$/, "")}${path.startsWith("/") ? path : `/${path}`}`;
        const resp = await fetch(finalUrl, fetchOpts);
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || data.error || `HTTP ${resp.status}`);
        return data;
      } catch (e) {
        if (dom.backendStatus) dom.backendStatus.textContent = "Backend Offline";
        throw e;
      }
    }

    /* THE MATRIX ENGINE */
    async function runMatrixCast() {
      const payload = getPayload();
      if (!payload.prompt) return setFooterMsg("Inspiration required.", "error");

      const models = state.activeMode === "nsfw" ? STAR_MODELS : DAY_MODELS;
      dom.gallery.style.display = "none";
      const mGallery = document.getElementById("matrixGallery");
      mGallery.classList.remove("hidden"); mGallery.classList.add("grid");

      mGallery.innerHTML = models.map((m) => `
        <div id="matrix-cell-${m.replace(/\s+/g, '-')}" class="art-frame aspect-square flex flex-col items-center justify-center bg-black/40 border border-white/10 relative group overflow-hidden">
          <span class="text-[10px] font-bold uppercase text-[var(--text-muted)] tracking-widest absolute bottom-3 z-20 group-hover:opacity-0 transition-opacity bg-black/50 px-2 py-0.5 rounded-lg border border-white/5">${m}</span>
          <div class="loader opacity-40 hidden z-20" style="width:20px;height:20px;"></div>
          <img src="" class="absolute inset-0 w-full h-full object-cover hidden transition-all duration-1000 opacity-0 scale-110 z-10">
        </div>
      `).join("");

      dom.generateBtn.disabled = true; dom.matrixBtn.disabled = true;
      dom.btnMatrixText.textContent = "Casting..."; dom.btnMatrixLoader.classList.remove("hidden");
      document.getElementById("matrixControls").classList.remove("hidden");

      state.matrixPaused = false; state.matrixCancelled = false;
      updateMatrixStatusUI();

      try {
        setView("generate");
        let completedCount = 0; const totalModels = models.length;
        const updateMatrixProgress = () => {
          document.getElementById("matrixStatusText").textContent = `Manifesting: ${completedCount} / ${totalModels} complete`;
        };
        updateMatrixProgress();

        for (let i = 0; i < totalModels; i++) {
          if (state.matrixCancelled) break;
          while (state.matrixPaused) { await sleep(1000); if (state.matrixCancelled) break; }

          const model = models[i];
          const mPayload = { ...payload, model };
          const cellId = `matrix-cell-${model.replace(/\s+/g, '-')}`;
          const cell = document.getElementById(cellId);

          if (cell) { cell.querySelector(".loader").classList.remove("hidden"); cell.dataset.requestId = `job-${Date.now()}`; }

          try {
            const res = await apiFetch("/generate", { method: "POST", body: JSON.stringify(mPayload) });
            cell.dataset.requestId = res.request_id;
            pollSingleMatrixCellBackground(res.request_id, cell).then(() => {
              completedCount++; updateMatrixProgress();
            });
          } catch (e) {
            completedCount++; updateMatrixProgress();
            if (cell) { cell.querySelector(".loader")?.classList.add("hidden"); cell.style.boxShadow = "inset 0 0 40px rgba(239, 68, 68, 0.2)"; }
          }
          await sleep(13000);
        }
        setFooterMsg("Celestial Matrix Complete.", "success");
      } catch (err) { setFooterMsg("Matrix Error: " + err.message, "error"); } 
      finally {
        dom.generateBtn.disabled = false; dom.matrixBtn.disabled = false;
        dom.btnMatrixText.textContent = "Matrix"; dom.btnMatrixLoader.classList.add("hidden");
      }
    }

    function toggleMatrixPause() { state.matrixPaused = !state.matrixPaused; updateMatrixStatusUI(); }
    function cancelMatrix() { state.matrixCancelled = true; state.matrixPaused = false; updateMatrixStatusUI(); }
    function updateMatrixStatusUI() {
      const btn = document.getElementById("matrixPauseBtn"), text = document.getElementById("matrixStatusText"), pulse = document.getElementById("matrixStatusPulse");
      if (state.matrixCancelled) { text.textContent = "Matrix Cancelled"; pulse.className = "w-2 h-2 rounded-full bg-red-500"; btn.disabled = true; return; }
      if (state.matrixPaused) { text.textContent = "Matrix Paused"; pulse.className = "w-2 h-2 rounded-full bg-amber-500 animate-pulse"; btn.textContent = "Resume"; } 
      else { text.textContent = "Matrix Active"; pulse.className = "w-2 h-2 rounded-full bg-emerald-500 animate-pulse"; btn.textContent = "Pause"; }
    }

    async function pollSingleMatrixCellBackground(requestId, cell) {
      while (!state.matrixCancelled) {
        if (cell && cell.dataset.requestId !== requestId) break; 
        while (state.matrixPaused && !state.matrixCancelled) await sleep(1000);
        if (state.matrixCancelled) break;

        try {
          const res = await apiFetch(`/job-status/${requestId}`);
          const urls = (res.images?.length > 0) ? res.images.map(img => img.r2_url).filter(Boolean) : (res.result?.image_urls || []).filter(Boolean);
          if (res.status === "done" && urls.length > 0) { updateMatrixCell(cell, urls, requestId); return; }
          if (res.status === "failed") {
            if (cell) { cell.querySelector(".loader")?.classList.add("hidden"); cell.style.boxShadow = "inset 0 0 40px rgba(239, 68, 68, 0.2)"; }
            return;
          }
        } catch (e) {}
        await sleep(3000);
      }
    }

    function updateMatrixCell(cell, urls, requestId) {
      if (!cell || !urls?.length) return;
      const img = cell.querySelector("img"), loader = cell.querySelector(".loader"), label = cell.querySelector("span");
      if (loader) loader.classList.add("hidden");
      if (img) { img.src = urls[0]; img.classList.remove("hidden", "opacity-0", "scale-110"); img.classList.add("opacity-100"); }
      if (label) label.classList.add("opacity-0");
      cell.onclick = () => openHistoryGroup({ request_id: requestId, images: urls.map((u, idx) => ({ r2_url: u, image_index: idx })) });
    }

    /* STANDARD GENERATION */
    async function runGeneration() {
      setView("generate");
      dom.gallery.style.display = ""; document.getElementById("matrixGallery").classList.add("hidden");
      const payload = getPayload();
      if (!payload.prompt) return setFooterMsg("Inspiration required.", "error");

      setLoading(true); state.isGenerating = true; setProgress(0);
      dom.gallery.innerHTML = '<div class="col-span-full py-24 animate-pulse opacity-50 cinematic-text text-2xl uppercase tracking-widest text-center">Weaving Vision...</div>';

      try {
        const res = await apiFetch("/generate", { method: "POST", body: JSON.stringify(payload) });
        saveActiveRequest(res.request_id);
        await pollUntilDone(res.request_id, payload);
      } catch (err) {
        setFooterMsg(`Generation failed: ${err.message}`, "error"); setProgress(-1);
      } finally { setLoading(false); state.isGenerating = false; }
    }

    async function pollUntilDone(requestId, payload, maxAttempts = 120) {
      state.currentPoll = requestId;
      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        if (state.currentPoll !== requestId) return false;
        try {
          const res = await apiFetch(`/job-status/${requestId}`);
          if (res.images?.length > 0) {
            const urls = res.images.map(img => img.r2_url);
            renderGallery(urls, requestId, payload, res);
          }
          if (res.status === "done") { setProgress(3); setTimeout(() => setProgress(-1), 3000); return true; }
          if (res.status === "error" || res.status === "failed") { setFooterMsg(res.error || "Generation failed.", "error"); setProgress(-1); return false; }
        } catch (err) {}
        await sleep(3000);
      }
      return false;
    }

    function setProgress(step) {
      const p = document.getElementById("progressMatrix");
      if (step === -1) { p.classList.add("opacity-0"); return; }
      p.classList.remove("opacity-0");
      document.querySelectorAll(".progress-step").forEach((s, idx) => {
        s.classList.toggle("done", idx < step); s.classList.toggle("active", idx === step);
      });
    }

    function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

    function renderGallery(urls, requestId, payload, meta = {}) {
      dom.gallery.innerHTML = urls.map((url, idx) => `
        <div class="bubble" id="bubble-${requestId}-${idx}" style="animation-delay: ${idx * 0.15}s">
          <span class="vault-badge">Vaulted</span>
          <div class="bubble-img-overlay"><img src="${url}" loading="lazy"></div>
          <div class="bubble-sphere"></div>
          <canvas class="bubble-canvas" width="260" height="260"></canvas>
        </div>
      `).join("");
      urls.forEach((url, idx) => {
        const b = document.getElementById(`bubble-${requestId}-${idx}`);
        if (b) b.onclick = () => popBubble(b, url, { ...payload, ...meta }, urls);
      });
    }

    /* THE VAULT & HISTORY ENGINE */
    async function loadHistoryPage() {
      if (state.loadingHistory || !state.historyHasMore) return;
      state.loadingHistory = true; if (dom.loadMoreBtn) dom.loadMoreBtn.textContent = "Summoning...";
      try {
        const cursorParam = state.historyCursor ? `&before=${state.historyCursor}` : "";
        const res = await apiFetch(`/history?limit=${state.historyLimit}${cursorParam}&uid=${state.activeUid}`);
        state.historyHasMore = !!res.has_more; state.historyCursor = res.next_cursor;
        res.items.forEach((entry) => {
          if (!entry.images?.length) return;
          if (document.getElementById(`batch-${entry.request_id}`)) return; // De-duplication fix
          dom.historyList.appendChild(createBatchCard(entry));
        });
      } catch (err) {} finally { state.loadingHistory = false; if (dom.loadMoreBtn) dom.loadMoreBtn.classList.toggle("hidden", !state.historyHasMore); }
    }

    async function renderHistory() {
      if (state.historyLoaded) return;
      state.historyLoaded = true; state.historyCursor = null; state.historyHasMore = true;
      dom.historyList.innerHTML = ""; await loadHistoryPage();
    }

    function createBatchCard(entry) {
      const wrap = document.createElement("div"); wrap.id = `batch-${entry.request_id}`;
      wrap.className = "glass-panel p-4 pb-5 cursor-pointer group relative border-white/5 hover:border-[var(--accent)]";
      wrap.onclick = (e) => { if (state.selectionMode) toggleBatchSelection(entry.request_id); else openHistoryGroup(entry); };
      wrap.innerHTML = `
          <div class="flex items-center justify-between gap-2 mb-3">
            <div class="text-[9px] uppercase tracking-widest text-[var(--accent)] font-black">${entry.realm || "day"}</div>
            <div class="selection-indicator hidden w-5 h-5 rounded-full border-2 border-white/20"></div>
          </div>
          <div class="grid grid-cols-2 gap-2">
            ${(entry.images || []).slice(0, 4).map((img) => `<img src="${img.r2_url}" class="w-full aspect-square object-cover rounded-lg" loading="lazy">`).join("")}
          </div>
          <div class="mt-3 text-[10px] font-bold truncate opacity-60 uppercase tracking-widest">${entry.prompt || "No Inscription"}</div>
        `;
      return wrap;
    }

    /* MODALS & REVEALS */
    function popBubble(el, url, data, batchUrls = []) {
      const canvas = el.querySelector("canvas"); if (!canvas) return;
      const ctx = canvas.getContext("2d"); const particles = [];
      for (let i = 0; i < 30; i++) particles.push({ x: 130, y: 130, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10, size: Math.random() * 3, alpha: 1 });
      const animate = () => {
        ctx.clearRect(0, 0, 260, 260);
        particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.alpha -= 0.03; ctx.fillStyle = `rgba(139, 92, 246, ${Math.max(0, p.alpha)})`; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); });
        if (particles[0].alpha > 0) requestAnimationFrame(animate);
      };
      animate();
      setTimeout(() => openModalHelper(url, data, batchUrls), 150);
    }

    function openHistoryGroup(entry) {
      const urls = (entry.images || []).map(img => img.r2_url).filter(Boolean);
      if (urls.length) openModalHelper(urls[0], entry, urls);
    }

    function openModalHelper(url, data, batchUrls) {
      const reveal = document.getElementById("bubbleReveal");
      document.getElementById("bubbleRevealImg").src = url; document.getElementById("bubbleRevealDownload").href = url;
      
      document.getElementById("metaRealm").textContent = data.realm || "day";
      document.getElementById("metaModel").textContent = data.model || "Standard";
      document.getElementById("metaPrompt").textContent = data.prompt;
      state.__inspected_data = data;

      const thumbsGrid = document.getElementById("bubbleRevealThumbs");
      document.getElementById("thumbsSection").classList.toggle("hidden", batchUrls.length <= 1);
      thumbsGrid.innerHTML = batchUrls.map(u => `
        <img src="${u}" class="w-full aspect-square object-cover rounded-lg cursor-pointer border-2 ${u===url?'border-[var(--accent)]':'border-transparent'}" onclick="event.stopPropagation(); document.getElementById('bubbleRevealImg').src='${u}'; document.getElementById('bubbleRevealDownload').href='${u}';">
      `).join("");

      reveal.style.display = "flex"; void reveal.offsetWidth; reveal.classList.add("active");
    }

    function closeBubbleReveal(e) {
      if (e && e.target.tagName === "IMG") return;
      const reveal = document.getElementById("bubbleReveal");
      reveal.classList.remove("active"); setTimeout(() => reveal.style.display = "none", 600);
    }

    function banishCurrentItem() {
        const data = state.__inspected_data;
        if (!data || !data.request_id) return;
        openConfirm("Banish Batch?", "Return this entire batch to the void forever?", async () => {
            await apiFetch(`/history/batch/${data.request_id}`, { method: 'DELETE' });
            closeBubbleReveal();
            document.getElementById(`batch-${data.request_id}`)?.remove();
            setFooterMsg("Banishment successful.");
        });
    }

    function cloneActiveManifestation() {
      const data = state.__inspected_data; if (!data) return;
      applyMode(data.realm === "star" ? "nsfw" : "standard");
      dom.model.value = data.model || "Gen"; dom.prompt.value = data.prompt; dom.negativePrompt.value = data.negative_prompt || "";
      closeBubbleReveal(); setView("generate");
    }

    function toggleSelectionMode(force) {
      state.selectionMode = force !== undefined ? force : !state.selectionMode;
      document.getElementById("toggleSelectBtn").textContent = state.selectionMode ? "Cancel" : "Select Mode";
      document.querySelectorAll(".selection-indicator").forEach(i => i.classList.toggle("hidden", !state.selectionMode));
      if (!state.selectionMode) state.selectedIds.clear(); updateSelectionUI();
    }

    function toggleBatchSelection(id) {
      if (state.selectedIds.has(id)) state.selectedIds.delete(id); else state.selectedIds.add(id);
      const el = document.getElementById(`batch-${id}`);
      el.classList.toggle("border-[var(--accent)]", state.selectedIds.has(id));
      el.querySelector(".selection-indicator").classList.toggle("bg-[var(--accent)]", state.selectedIds.has(id));
      updateSelectionUI();
    }

    function updateSelectionUI() {
      document.getElementById("selectCount").textContent = state.selectedIds.size;
      document.getElementById("selectionBar").classList.toggle("hidden", state.selectedIds.size === 0);
    }

    async function executeBulkAction(action) {
        if (action === 'delete') {
            const ids = Array.from(state.selectedIds);
            openConfirm("Banish Selection?", `Return ${ids.length} manifestations to the void?`, async () => {
                for (const id of ids) {
                    apiFetch(`/history/batch/${id}`, { method: 'DELETE' }).catch(()=>{});
                    document.getElementById(`batch-${id}`)?.remove();
                }
                toggleSelectionMode(false);
                setFooterMsg("Banishment complete.");
            });
        }
    }

    function openConfirm(title, msg, onConfirm) {
      document.getElementById("confirmTitle").textContent = title; document.getElementById("confirmMsg").textContent = msg;
      const yes = document.getElementById("confirmYes"); yes.onclick = () => { onConfirm(); closeConfirm(); };
      document.getElementById("confirmModal").classList.remove("hidden");
    }
    function closeConfirm() { document.getElementById("confirmModal").classList.add("hidden"); }

    function initAetherCanvas() {
      const canvas = document.getElementById('aetherCanvas'), ctx = canvas.getContext('2d');
      let w, h; const particles = [];
      function resize() { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; }
      window.addEventListener('resize', resize); resize();
      for (let i = 0; i < 40; i++) particles.push({ x: Math.random() * w, y: Math.random() * h, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3, size: Math.random()*2, shift: Math.random()*Math.PI*2 });
      function animate() {
        if (document.visibilityState === 'visible') {
          ctx.clearRect(0, 0, w, h);
          particles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.shift += 0.01;
            if (p.x<0) p.x=w; if (p.x>w) p.x=0; if (p.y<0) p.y=h; if (p.y>h) p.y=0;
            const a = (Math.sin(p.shift)*0.3)+0.3;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fillStyle = state.activeMode === "nsfw" ? `rgba(139, 92, 246, ${a})` : `rgba(16, 185, 129, ${a})`; ctx.fill();
          });
        }
        requestAnimationFrame(animate);
      }
      animate();
    }
    initAetherCanvas();

    function setView(v) {
      state.activeView = v;
      document.querySelectorAll(".view").forEach(el => el.classList.add("hidden"));
      document.getElementById(`view-${v}`).classList.remove("hidden");
      document.querySelectorAll("[data-view]").forEach(b => {
          const isM = b.dataset.view === v;
          b.classList.toggle("active", isM); b.classList.toggle("opacity-100", isM); b.classList.toggle("opacity-60", !isM);
      });
      if (v === "history") renderHistory();
      if (window.innerWidth < 1024 && (v === "history")) toggleConsole(true);
    }

    function toggleConsole(force) {
      const el = document.getElementById("desktopConsole");
      const isM = force === true ? true : !el.classList.contains("minimized");
      el.classList.toggle("minimized", isM);
      document.getElementById("consoleToggleText").textContent = isM ? "Expand" : "Minimize";
      document.getElementById("mobileToggleStub").style.display = isM ? "block" : "none";
    }

    function rollOracle() {
        dom.prompt.value = ORACLE_PROMPTS[Math.floor(Math.random() * ORACLE_PROMPTS.length)];
        setFooterMsg("The Oracle has spoken.");
    }

    function clearPrompt() { dom.prompt.value = ""; dom.negativePrompt.value = ""; }
    function pastePrompt() { navigator.clipboard.readText().then(t => dom.prompt.value = t); }
    function reloadHistory() { state.historyLoaded = false; renderHistory(); }
    function escapeHtml(v) { return String(v).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    document.querySelectorAll("[data-view]").forEach(b => b.onclick = () => setView(b.dataset.view));
    document.querySelectorAll("[data-mode]").forEach(b => b.onclick = () => applyMode(b.dataset.mode));
    dom.generateBtn.onclick = runGeneration;

    applyMode(state.activeMode); renderActiveRequest();
    apiFetch("/health").then(r => dom.backendStatus.textContent = r.status==="ok" ? "Backend Online" : "Backend Offline").catch(() => dom.backendStatus.textContent = "Backend Offline");
  </script>
</body>
</html>
